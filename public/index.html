<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✈️ Paperplane Crash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── AUTH ── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 12px;
    }
    #auth-screen h1 { font-size: 2.5rem; margin-bottom: 10px; }
    #auth-screen input {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: #1a1a2e;
      color: #fff;
      font-size: 1rem;
      width: 280px;
    }
    #auth-screen button {
      padding: 12px 30px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      width: 280px;
    }
    #btn-login { background: #e94560; color: #fff; }
    #btn-register { background: #1a1a2e; color: #aaa; border: 1px solid #333; }
    #auth-error { color: #e94560; font-size: 0.9rem; }

    /* ── GAME ── */
    #game-screen { display: none; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: #0d0d1f;
      border-bottom: 1px solid #1a1a3e;
    }
    .top-bar .logo { font-size: 1.3rem; font-weight: bold; }
    .top-bar .user-info { display: flex; gap: 20px; align-items: center; }
    #balance { color: #00ff88; font-weight: bold; font-size: 1.1rem; }
    #connected-count { color: #aaa; font-size: 0.9rem; }

    .main-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 0;
      height: calc(100vh - 55px);
    }

    /* ── LEFT ── */
    .game-area {
      display: flex;
      flex-direction: column;
      padding: 15px;
      gap: 12px;
    }

    /* Historique crash */
    .crash-history {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .crash-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .crash-low { background: #3a0a0a; color: #e94560; }
    .crash-mid { background: #1a2a0a; color: #88ff44; }
    .crash-high { background: #0a1a3a; color: #4488ff; }

    /* Canvas de vol */
    .flight-box {
      background: #0d0d1f;
      border-radius: 15px;
      border: 1px solid #1a1a3e;
      position: relative;
      height: 220px;
      overflow: hidden;
    }
    #flight-canvas {
      width: 100%;
      height: 100%;
    }
    #multiplier {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3rem;
      font-weight: bold;
      color: #00ff88;
      text-shadow: 0 0 20px #00ff88;
      z-index: 10;
    }
    #status-text {
      position: absolute;
      top: 10px;
      left: 15px;
      font-size: 0.85rem;
      color: #aaa;
    }
    #countdown {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 1rem;
      color: #ffcc00;
      font-weight: bold;
    }

    /* Emojis flottants */
    .floating-emoji {
      position: absolute;
      font-size: 2rem;
      animation: floatUp 2s ease-out forwards;
      pointer-events: none;
      z-index: 20;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }

    /* Contrôles */
    .controls {
      background: #0d0d1f;
      border-radius: 15px;
      border: 1px solid #1a1a3e;
      padding: 15px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .controls input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1a1a2e;
      color: #fff;
      font-size: 1rem;
    }
    #main-btn {
      padding: 12px 25px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      min-width: 140px;
      transition: all 0.2s;
    }
    #bet-info {
      font-size: 0.9rem;
      color: #ffcc00;
      min-width: 160px;
    }

    /* Barre emoji */
    .emoji-bar {
      display: flex;
      gap: 10px;
      padding: 8px 0;
    }
    .emoji-btn {
      font-size: 1.6rem;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .emoji-btn:hover { transform: scale(1.2); }
    #message {
      font-size: 0.95rem;
      min-height: 22px;
    }

    /* ── RIGHT SIDEBAR ── */
    .sidebar {
      background: #0d0d1f;
      border-left: 1px solid #1a1a3e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid #1a1a3e;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 0.8rem;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: #fff;
      border-bottom-color: #e94560;
    }
    .tab-content {
      display: none;
      flex-direction: column;
      overflow-y: auto;
      flex: 1;
      padding: 10px;
    }
    .tab-content.active { display: flex; }

    /* Liste des mises */
    .bet-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 6px;
      background: #1a1a2e;
      font-size: 0.85rem;
    }
    .bet-item.cashed { background: #0a2a1a; }
    .bet-item .bet-user { color: #fff; font-weight: bold; }
    .bet-item .bet-amount { color: #ffcc00; }
    .bet-item .bet-status { color: #00ff88; }

    /* Leaderboard */
    .lb-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 6px;
      background: #1a1a2e;
      font-size: 0.85rem;
    }
    .lb-rank { color: #aaa; width: 24px; }
    .lb-rank.gold { color: #ffd700; font-weight: bold; }
    .lb-rank.silver { color: #c0c0c0; font-weight: bold; }
    .lb-rank.bronze { color: #cd7f32; font-weight: bold; }
    .lb-name { flex: 1; padding-left: 8px; }
    .lb-balance { color: #00ff88; font-weight: bold; }

    /* Joueurs connectés */
    .player-chip {
      display: inline-block;
      background: #1a1a2e;
      border-radius: 20px;
      padding: 4px 12px;
      margin: 3px;
      font-size: 0.8rem;
      color: #aaa;
    }
    .player-chip.me { color: #00ff88; border: 1px solid #00ff88; }

    /* Scroll custom */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a1a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="auth-screen">
  <h1>✈️ Paperplane Crash</h1>
  <input type="text" id="input-username" placeholder="Pseudo" />
  <input type="password" id="input-password" placeholder="Mot de passe" />
  <button id="btn-login" onclick="doLogin()">🔑 Connexion</button>
  <button id="btn-register" onclick="doRegister()">📝 Créer un compte</button>
  <span id="auth-error"></span>
</div>

<!-- ── GAME ── -->
<div id="game-screen">
  <div class="top-bar">
    <div class="logo">✈️ Paperplane Crash</div>
    <div class="user-info">
      <span id="connected-count">👥 0 joueur(s)</span>
      <span id="balance">💰 1000 $</span>
      <span id="username-display" style="color:#aaa; font-size:0.9rem;"></span>
    </div>
  </div>

  <div class="main-layout">
    <!-- GAUCHE -->
    <div class="game-area">

      <!-- Historique -->
      <div class="crash-history" id="crash-history">
        <span style="color:#555; font-size:0.85rem;">Historique des crashs :</span>
      </div>

      <!-- Zone de vol -->
      <div class="flight-box">
        <canvas id="flight-canvas"></canvas>
        <div id="status-text">⏳ Phase de mise</div>
        <div id="countdown"></div>
        <div id="multiplier">1.00x</div>
      </div>

      <!-- Contrôles -->
      <div class="controls">
        <input type="number" id="bet-input" placeholder="Mise (ex: 50)" min="1" />
        <div style="display:flex; flex-direction:column; gap:4px;">
          <button id="main-btn" onclick="mainAction()">✅ Miser</button>
          <div id="bet-info"></div>
        </div>
      </div>

      <!-- Emojis -->
      <div class="emoji-bar">
        <button class="emoji-btn" onclick="sendEmoji('💩')">💩</button>
        <button class="emoji-btn" onclick="sendEmoji('🖕')">🖕</button>
        <button class="emoji-btn" onclick="sendEmoji('🍆')">🍆</button>
        <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
        <button class="emoji-btn" onclick="sendEmoji('🔥')">🔥</button>
        <button class="emoji-btn" onclick="sendEmoji('💸')">💸</button>
        <button class="emoji-btn" onclick="sendEmoji('😱')">😱</button>
      </div>

      <div id="message"></div>
    </div>

    <!-- DROITE -->
    <div class="sidebar">
      <div class="sidebar-tabs">
        <button class="tab-btn active" onclick="switchTab('bets')">🎯 Mises</button>
        <button class="tab-btn" onclick="switchTab('leaderboard')">🏆 Classement</button>
        <button class="tab-btn" onclick="switchTab('players')">👥 Joueurs</button>
      </div>

      <div class="tab-content active" id="tab-bets">
        <div id="bets-list"><span style="color:#555; font-size:0.85rem;">Aucune mise</span></div>
      </div>

      <div class="tab-content" id="tab-leaderboard">
        <div id="leaderboard-list"></div>
      </div>

      <div class="tab-content" id="tab-players">
        <div id="players-list"></div>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ── STATE ──
  let token = null;
  let username = null;
  let balance = 0;
  let gamePhase = 'waiting';
  let hasBet = false;
  let currentBet = 0;
  const socket = io();

  // Canvas
  const canvas = document.getElementById('flight-canvas');
  const ctx = canvas.getContext('2d');
  let planeX = 0, planeY = 0;
  let currentMult = 1.0;

  function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function drawFlight(mult) {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    // Grille
    ctx.strokeStyle = '#1a1a3e';
    ctx.lineWidth = 1;
    for (let x = 0; x < w; x += 60) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let y = 0; y < h; y += 40) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    const progress = Math.min((Math.log(mult) / Math.log(10)), 1);
    planeX = progress * (w - 60) + 30;
    planeY = h - (progress * (h - 60)) - 30;

    // Ligne verte
    ctx.beginPath();
    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 3;
    ctx.moveTo(10, h - 10);
    ctx.lineTo(planeX, planeY);
    ctx.stroke();

    // Avion
    ctx.font = '28px serif';
    ctx.save();
    ctx.translate(planeX, planeY);
    const angle = -Math.atan2(progress * (h - 60), progress * (w - 60));
    ctx.rotate(angle);
    ctx.fillText('✈️', -14, 10);
    ctx.restore();
  }

  function resetCanvas() {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = '#1a1a3e';
    ctx.lineWidth = 1;
    for (let x = 0; x < w; x += 60) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let y = 0; y < h; y += 40) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
    ctx.font = '28px serif';
    ctx.fillText('✈️', 15, h - 15);
  }

  // ── UI ──
  function showMsg(msg, color) {
    const el = document.getElementById('message');
    el.textContent = msg;
    el.style.color = color;
  }

  function updateBtn() {
    const btn = document.getElementById('main-btn');
    if (gamePhase === 'betting' && !hasBet) {
      btn.textContent = '✅ Miser';
      btn.style.background = '#00aa55';
      btn.style.color = '#fff';
      btn.disabled = false;
    } else if (gamePhase === 'betting' && hasBet) {
      btn.textContent = '⏳ En attente...';
      btn.style.background = '#333';
      btn.style.color = '#aaa';
      btn.disabled = true;
    } else if (gamePhase === 'flying' && hasBet) {
      btn.textContent = '💸 CASHOUT';
      btn.style.background = '#e94560';
      btn.style.color = '#fff';
      btn.disabled = false;
    } else if (gamePhase === 'flying' && !hasBet) {
      btn.textContent = '🚀 En vol...';
      btn.style.background = '#333';
      btn.style.color = '#aaa';
      btn.disabled = true;
    } else {
      btn.textContent = '⏳ Prochain round...';
      btn.style.background = '#333';
      btn.style.color = '#aaa';
      btn.disabled = true;
    }
  }

  function mainAction() {
    if (gamePhase === 'betting' && !hasBet) {
      const amount = parseFloat(document.getElementById('bet-input').value);
      if (!amount || amount <= 0) return showMsg('❌ Mise invalide', '#e94560');
      socket.emit('place_bet', { token, amount });
    } else if (gamePhase === 'flying' && hasBet) {
      socket.emit('cashout', { token });
    }
  }

  function sendEmoji(emoji) {
    if (!token) return;
    socket.emit('send_emoji', { token, emoji });
  }

  function spawnEmoji(emoji, username) {
    const box = document.querySelector('.flight-box');
    const el = document.createElement('div');
    el.className = 'floating-emoji';
    el.textContent = emoji;
    el.title = username;
    el.style.left = (20 + Math.random() * 60) + '%';
    el.style.bottom = '20px';
    box.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['bets','leaderboard','players'][i] === tab);
    });
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
  }

  function updateCrashHistory(history) {
    const el = document.getElementById('crash-history');
    el.innerHTML = '<span style="color:#555; font-size:0.85rem;">Crashs :</span>';
    history.forEach(val => {
      const badge = document.createElement('span');
      badge.className = 'crash-badge ' + (val < 2 ? 'crash-low' : val < 5 ? 'crash-mid' : 'crash-high');
      badge.textContent = val.toFixed(2) + 'x';
      el.appendChild(badge);
    });
  }

  function updateBetsList(bets) {
    const el = document.getElementById('bets-list');
    if (!bets.length) {
      el.innerHTML = '<span style="color:#555; font-size:0.85rem;">Aucune mise</span>';
      return;
    }
    el.innerHTML = '';
    bets.forEach(b => {
      const div = document.createElement('div');
      div.className = 'bet-item' + (b.cashedOut ? ' cashed' : '');
      div.innerHTML = `
        <span class="bet-user">${b.username}</span>
        <span class="bet-amount">${b.amount}$</span>
        <span class="bet-status">${b.cashedOut ? '✅ ' + b.multiplier + 'x' : '🎯'}</span>
      `;
      el.appendChild(div);
    });
  }

  function updateLeaderboard(lb) {
    const el = document.getElementById('leaderboard-list');
    el.innerHTML = '';
    const medals = ['🥇', '🥈', '🥉'];
    lb.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'lb-item';
      div.innerHTML = `
        <span class="lb-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${medals[i] || (i+1)}</span>
        <span class="lb-name">${p.username}</span>
        <span class="lb-balance">${p.balance}$</span>
      `;
      el.appendChild(div);
    });
  }

  function updatePlayers(players) {
    const el = document.getElementById('players-list');
    el.innerHTML = '';
    players.forEach(p => {
      const span = document.createElement('span');
      span.className = 'player-chip' + (p === username ? ' me' : '');
      span.textContent = (p === username ? '⭐ ' : '') + p;
      el.appendChild(span);
    });
  }

  // ── AUTH ──
  async function doLogin() {
    const u = document.getElementById('input-username').value.trim();
    const p = document.getElementById('input-password').value.trim();
    if (!u || !p) return;
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (data.error) {
      document.getElementById('auth-error').textContent = data.error;
      return;
    }
    token = data.token;
    username = u;
    balance = data.balance;
    enterGame();
  }

  async function doRegister() {
    const u = document.getElementById('input-username').value.trim();
    const p = document.getElementById('input-password').value.trim();
    if (!u || !p) return;
    const res = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (data.error) {
      document.getElementById('auth-error').textContent = data.error;
      return;
    }
    token = data.token;
    username = u;
    balance = data.balance;
    enterGame();
  }

  function enterGame() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    document.getElementById('username-display').textContent = '👤 ' + username;
    socket.emit('identify', { token });
    resetCanvas();
    updateBtn();
  }

  // ── SOCKET EVENTS ──
  socket.on('betting_phase', (data) => {
    gamePhase = 'betting';
    hasBet = false;
    currentMult = 1.0;
    document.getElementById('multiplier').textContent = '1.00x';
    document.getElementById('multiplier').style.color = '#00ff88';
    document.getElementById('bet-info').textContent = '';
    document.getElementById('message').textContent = '';
    document.getElementById('status-text').textContent = '⏳ Phase de mise';
    resetCanvas();
    updateBtn();

    let sec = data.duration ? Math.ceil(data.duration / 1000) : 5;
    document.getElementById('countdown').textContent = '🕐 ' + sec + 's';
    const cd = setInterval(() => {
      sec--;
      if (sec <= 0) {
        clearInterval(cd);
        document.getElementById('countdown').textContent = '';
      } else {
        document.getElementById('countdown').textContent = '🕐 ' + sec + 's';
      }
    }, 1000);
  });

  socket.on('game_start', () => {
    gamePhase = 'flying';
    document.getElementById('status-text').textContent = '🚀 En vol !';
    document.getElementById('countdown').textContent = '';
    document.getElementById('message').textContent = '';
    updateBtn();
  });

  socket.on('multiplier_update', (data) => {
    currentMult = parseFloat(data.multiplier);
    document.getElementById('multiplier').textContent = currentMult.toFixed(2) + 'x';
    drawFlight(currentMult);
    if (hasBet) {
      const potential = (currentBet * currentMult).toFixed(2);
      document.getElementById('bet-info').textContent = '💰 ' + currentBet + '$ → ' + potential + '$';
    }
  });

  socket.on('game_crash', (data) => {
    gamePhase = 'crashed';
    document.getElementById('multiplier').textContent = '💥 ' + data.crashAt + 'x';
    document.getElementById('multiplier').style.color = '#e94560';
    document.getElementById('status-text').textContent = '💥 Crash !';
    if (data.crashHistory) updateCrashHistory(data.crashHistory);
    hasBet = false;
    updateBtn();
  });

  socket.on('crash_history', (data) => {
    updateCrashHistory(data.crashHistory);
  });

  socket.on('lost', () => {
    showMsg('💥 Perdu !', '#e94560');
  });

  socket.on('bet_placed', (data) => {
    balance = data.balance;
    currentBet = data.amount;
    hasBet = true;
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    document.getElementById('bet-info').textContent = '🎯 Mise : ' + currentBet + '$';
    showMsg('✅ Mise placée !', '#00ff88');
    updateBtn();
  });

  socket.on('cashout_success', (data) => {
    balance = data.balance;
    hasBet = false;
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    document.getElementById('bet-info').textContent = '';
    showMsg('✅ Cashout x' + data.multiplier + ' → +' + data.profit + '$', '#00ff88');
    updateBtn();
  });

  socket.on('bet_error', (data) => showMsg('❌ ' + data.message, '#e94560'));
  socket.on('cashout_error', (data) => showMsg('❌ ' + data.message, '#e94560'));

  socket.on('bets_update', (data) => {
    updateBetsList(data.activeBets);
  });

  socket.on('lobby_update', (data) => {
    document.getElementById('connected-count').textContent =
      '👥 ' + data.connectedCount + ' joueur' + (data.connectedCount > 1 ? 's' : '');
    updateLeaderboard(data.leaderboard);
    updatePlayers(data.connectedUsers);
    updateBetsList(data.activeBets);
  });

  socket.on('emoji_received', (data) => {
    spawnEmoji(data.emoji, data.username);
  });
</script>
</body>
</html>
