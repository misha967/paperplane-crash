<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>✈️ Paperplane Crash</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --bg: #060610;
      --surface: #0d0d20;
      --surface2: #13132a;
      --border: #1e1e40;
      --green: #00f0a0;
      --green-dim: #00f0a033;
      --red: #ff3a5c;
      --red-dim: #ff3a5c33;
      --yellow: #ffd60a;
      --blue: #4488ff;
      --text: #ffffff;
      --muted: #9999cc;
      --font-main: 'Rajdhani', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ══ AUTH ══ */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      gap: 12px;
      padding: 24px;
      background: radial-gradient(ellipse at center, #0d0d30 0%, #060610 70%);
    }
    .auth-logo {
      font-family: var(--font-main);
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--green);
      text-shadow: 0 0 40px var(--green-dim);
      margin-bottom: 8px;
    }
    .auth-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 12px; letter-spacing: 1px; }
    #auth-screen input {
      padding: 13px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: #fff;
      font-family: var(--font-main);
      font-size: 1rem;
      font-weight: 600;
      width: 100%;
      max-width: 320px;
      outline: none;
      transition: border-color 0.2s;
    }
    #auth-screen input:focus { border-color: var(--green); }
    .auth-btn {
      padding: 13px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: var(--font-main);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      width: 100%;
      max-width: 320px;
      transition: all 0.15s;
    }
    .auth-btn:active { transform: scale(0.97); }
    #btn-login { background: var(--green); color: #000; }
    #btn-register { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    #auth-error { color: var(--red); font-size: 0.85rem; text-align: center; min-height: 18px; }

    /* ══ GAME ══ */
    #game-screen { display: none; flex-direction: column; height: 100dvh; }

    /* TOP BAR */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 8px;
    }
    .logo {
      font-family: var(--font-main);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--green);
      white-space: nowrap;
    }
    .top-stats { display: flex; align-items: center; gap: 14px; flex: 1; justify-content: flex-end; }
    #connected-count { color: var(--muted); font-size: 0.75rem; }
    #balance { color: var(--green); font-weight: 700; font-family: var(--font-mono); font-size: 0.88rem; }
    #username-display { color: var(--muted); font-size: 0.75rem; }

    /* HISTORY */
    .history-bar {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 14px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .history-bar::-webkit-scrollbar { display: none; }
    .history-label { color: var(--muted); font-size: 0.68rem; flex-shrink: 0; text-transform: uppercase; letter-spacing: 1px; }
    .crash-badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      font-family: var(--font-mono);
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .crash-low { background: #2a0810; color: var(--red); }
    .crash-mid { background: #0a2a18; color: var(--green); }
    .crash-high { background: #0a1535; color: var(--blue); }

    /* ══ MAIN LAYOUT ══ */
    .main-layout { display: flex; flex: 1; overflow: hidden; }
    .left-col { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* FLIGHT BOX */
    .flight-box {
      position: relative;
      flex: 1;
      background: var(--bg);
      overflow: hidden;
    }
    #flight-canvas { width: 100%; height: 100%; display: block; }

    #multiplier {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-mono);
      font-size: clamp(2.2rem, 8vw, 4.5rem);
      font-weight: 700;
      color: var(--green);
      text-shadow: 0 0 40px var(--green-dim);
      pointer-events: none;
      white-space: nowrap;
      transition: color 0.1s, text-shadow 0.1s;
    }
    #status-text {
      position: absolute;
      top: 10px;
      left: 12px;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #countdown {
      position: absolute;
      top: 10px;
      right: 12px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--yellow);
      font-weight: 700;
    }

    /* Emoji bubbles */
    .emoji-bubble {
      position: absolute;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 8px;
      font-size: 0.75rem;
      font-family: var(--font-main);
      font-weight: 600;
      color: #fff;
      animation: bubbleUp 3s ease-out forwards;
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
    }
    @keyframes bubbleUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      80%  { opacity: 0.9; }
      100% { opacity: 0; transform: translateY(-100px) scale(0.8); }
    }

    /* Cashout notification */
    .cashout-notif {
      position: absolute;
      right: 12px;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 0.78rem;
      font-family: var(--font-main);
      font-weight: 700;
      background: #0a2a18;
      border: 1px solid var(--green);
      color: var(--green);
      animation: slideIn 2.5s ease-out forwards;
      pointer-events: none;
      z-index: 20;
    }
    @keyframes slideIn {
      0%   { opacity: 0; transform: translateX(30px); }
      15%  { opacity: 1; transform: translateX(0); }
      80%  { opacity: 1; }
      100% { opacity: 0; transform: translateX(30px); }
    }

    /* ══ CONTROLS PANEL ══ */
    .controls-panel {
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Double bet tabs */
    .bet-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 2px;
    }
    .bet-tab {
      flex: 1;
      padding: 6px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-family: var(--font-main);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }
    .bet-tab.active { border-color: var(--green); color: var(--green); background: #0a2a18; }
    .bet-tab.active2 { border-color: var(--blue); color: var(--blue); background: #0a1535; }

    /* Bet panels */
    .bet-panel { display: none; }
    .bet-panel.visible { display: block; }

    .bet-area { display: flex; gap: 8px; align-items: stretch; }
    .bet-input-wrap { flex: 1; display: flex; flex-direction: column; gap: 5px; }

    .amount-display {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      transition: border-color 0.2s;
    }
    .amount-display:focus-within { border-color: var(--green); }
    .amount-display.bet2:focus-within { border-color: var(--blue); }
    .amount-display input {
      background: none;
      border: none;
      color: #fff;
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      width: 100%;
      outline: none;
    }
    .amount-display input::placeholder { color: #333; }
    .currency { color: var(--yellow); font-weight: 700; font-size: 0.9rem; font-family: var(--font-mono); }

    .quick-row { display: flex; gap: 4px; }
    .q-btn {
      flex: 1;
      padding: 5px 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-family: var(--font-main);
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s;
    }
    .q-btn:active { background: #1a1a4a; color: #fff; transform: scale(0.95); }
    .half-double { display: flex; gap: 4px; }
    .hd-btn {
      flex: 1;
      padding: 5px 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-family: var(--font-main);
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s;
    }
    .hd-btn:active { background: #1a1a4a; color: #fff; transform: scale(0.95); }

    /* Auto options row */
    .auto-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .auto-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 5px 10px;
      flex: 1;
      min-width: 130px;
    }
    .auto-label { font-size: 0.72rem; color: var(--muted); white-space: nowrap; font-weight: 600; }
    .auto-pill input {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 700;
      outline: none;
      min-width: 40px;
      width: 50px;
    }
    .auto-pill input::placeholder { color: #333; }
    .auto-toggle {
      width: 36px;
      height: 19px;
      background: #333;
      border-radius: 20px;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
      border: none;
    }
    .auto-toggle.on { background: var(--green); }
    .auto-toggle::after {
      content: '';
      position: absolute;
      width: 15px;
      height: 15px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }
    .auto-toggle.on::after { left: 19px; }

    /* Auto-bet pill */
    .autobet-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 5px 10px;
    }

    /* MAIN BUTTON */
    #main-btn, #main-btn2 {
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      font-family: var(--font-main);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
      align-self: stretch;
      min-width: 100px;
    }
    #main-btn:active, #main-btn2:active { transform: scale(0.97); }

    /* Status row */
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #bet-info { font-size: 0.78rem; color: var(--yellow); font-family: var(--font-mono); }
    #message { font-size: 0.78rem; font-family: var(--font-main); font-weight: 600; }

    /* EMOJI */
    .emoji-row { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; padding-bottom: 1px; }
    .emoji-row::-webkit-scrollbar { display: none; }
    .emoji-btn {
      font-size: 1.35rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 5px 10px;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.1s;
    }
    .emoji-btn:active { transform: scale(1.2); }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: 230px;
      background: var(--bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab-btn {
      flex: 1;
      padding: 9px 2px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font-main);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .tab-btn.active { color: #fff; border-bottom-color: var(--green); }
    .tab-content { display: none; flex-direction: column; overflow-y: auto; flex: 1; padding: 6px; gap: 4px; }
    .tab-content.active { display: flex; }
    .empty-msg { color: #2a2a5a; font-size: 0.78rem; padding: 6px; }

    .bet-item {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      border-radius: 7px;
      background: var(--surface2);
      font-size: 0.77rem;
      gap: 4px;
    }
    .bet-item.cashed { background: #0a2018; }
    .bet-user { font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bet-amount { color: var(--yellow); flex-shrink: 0; font-family: var(--font-mono); font-size: 0.72rem; }
    .bet-status { flex-shrink: 0; font-size: 0.72rem; }
    .bet-status2 { flex-shrink: 0; font-size: 0.68rem; color: var(--blue); }

    .lb-item {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      border-radius: 7px;
      background: var(--surface2);
      font-size: 0.77rem;
      gap: 5px;
    }
    .lb-rank { width: 20px; text-align: center; color: var(--muted); font-size: 0.72rem; flex-shrink: 0; }
    .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
    .lb-name.me { color: var(--green); }
    .lb-balance { color: var(--green); font-weight: 700; flex-shrink: 0; font-family: var(--font-mono); font-size: 0.72rem; }

    .player-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 8px;
      border-radius: 7px;
      background: var(--surface2);
      font-size: 0.77rem;
    }
    .player-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 6px var(--green); }
    .player-name.me { color: var(--green); font-weight: 700; }

    /* STATS TAB */
    .stats-section { padding: 8px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1; }
    .stat-card {
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
    }
    .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
    .stat-value { font-family: var(--font-mono); font-size: 1rem; font-weight: 700; color: var(--green); }
    .stat-value.red { color: var(--red); }
    .stat-value.yellow { color: var(--yellow); }

    #mini-chart { width: 100%; height: 60px; }

    .history-list { display: flex; flex-direction: column; gap: 3px; overflow-y: auto; max-height: 200px; }
    .history-entry {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 6px;
      border-radius: 6px;
      background: var(--surface);
      font-size: 0.7rem;
      font-family: var(--font-mono);
    }
    .history-entry.win { border-left: 2px solid var(--green); }
    .history-entry.loss { border-left: 2px solid var(--red); }
    .he-crash { color: var(--muted); flex-shrink: 0; }
    .he-profit { font-weight: 700; flex-shrink: 0; margin-left: auto; }
    .he-profit.pos { color: var(--green); }
    .he-profit.neg { color: var(--red); }

    /* ══ MOBILE ══ */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .mobile-tabs-wrap { display: flex; flex-direction: column; flex-shrink: 0; }
      .mobile-tabs {
        display: flex;
        border-top: 1px solid var(--border);
        background: var(--bg);
      }
      .mobile-tab-btn {
        flex: 1;
        padding: 7px 2px;
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-family: var(--font-main);
        font-size: 0.65rem;
        font-weight: 600;
        border-top: 2px solid transparent;
        transition: all 0.15s;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .mobile-tab-btn.active { color: #fff; border-top-color: var(--green); }
      .mobile-tab-content {
        display: none;
        background: var(--bg);
        max-height: 120px;
        overflow-y: auto;
        padding: 5px 8px;
        gap: 4px;
        flex-direction: column;
        border-top: 1px solid var(--border);
      }
      .mobile-tab-content.active { display: flex; }
      .emoji-btn { font-size: 1.5rem; padding: 6px 11px; }
      #main-btn, #main-btn2 { font-size: 0.95rem; padding: 11px; min-width: 90px; }
    }
    @media (min-width: 641px) {
      .mobile-tabs-wrap { display: none; }
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="auth-screen">
  <div class="auth-logo">✈️ PAPERPLANE</div>
  <div class="auth-sub">CRASH GAME</div>
  <input type="text" id="input-username" placeholder="Pseudo" autocomplete="off" />
  <input type="password" id="input-password" placeholder="Mot de passe" />
  <button class="auth-btn" id="btn-login" onclick="doLogin()">CONNEXION</button>
  <button class="auth-btn" id="btn-register" onclick="doRegister()">CRÉER UN COMPTE</button>
  <span id="auth-error"></span>
</div>

<!-- ══ GAME ══ -->
<div id="game-screen">

  <div class="top-bar">
    <div class="logo">✈️ PAPERPLANE</div>
    <div class="top-stats">
      <span id="connected-count">👥 0</span>
      <span id="balance">💰 1000 $</span>
      <span id="username-display"></span>
    </div>
  </div>

  <div class="history-bar">
    <span class="history-label">Crashs :</span>
    <div id="crash-history" style="display:flex;gap:5px;"></div>
  </div>

  <div class="main-layout">

    <!-- LEFT -->
    <div class="left-col">

      <div class="flight-box">
        <canvas id="flight-canvas"></canvas>
        <div id="status-text">⏳ MISE EN ATTENTE</div>
        <div id="countdown"></div>
        <div id="multiplier" style="display:none;">1.00x</div>
      </div>

      <!-- CONTROLS -->
      <div class="controls-panel">

        <!-- Emoji + Son -->
        <div class="status-row">
          <div class="emoji-row">
            <button class="emoji-btn" onclick="sendEmoji('💩')">💩</button>
            <button class="emoji-btn" onclick="sendEmoji('🖕')">🖕</button>
            <button class="emoji-btn" onclick="sendEmoji('🍆')">🍆</button>
            <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
            <button class="emoji-btn" onclick="sendEmoji('🔥')">🔥</button>
            <button class="emoji-btn" onclick="sendEmoji('💸')">💸</button>
            <button class="emoji-btn" onclick="sendEmoji('😱')">😱</button>
          </div>
          <button id="sound-btn" onclick="toggleSound()" title="Son on/off" style="font-size:1.2rem;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:5px 10px;cursor:pointer;flex-shrink:0;transition:all 0.15s;color:#fff;">🔊</button>
        </div>

        <!-- Bet tabs -->
        <div class="bet-tabs">
          <button class="bet-tab active" id="tab-bet1" onclick="showBetPanel(1)">🎯 MISE 1</button>
          <button class="bet-tab" id="tab-bet2" onclick="showBetPanel(2)">➕ MISE 2</button>
        </div>

        <!-- Bet 1 -->
        <div class="bet-panel visible" id="panel-bet1">
          <div class="bet-area">
            <div class="bet-input-wrap">
              <div class="amount-display">
                <input type="number" id="bet-input" placeholder="50" value="50" min="1" />
                <span class="currency">$</span>
              </div>
              <div class="quick-row">
                <button class="q-btn" onclick="setQuick(1, 10)">10$</button>
                <button class="q-btn" onclick="setQuick(1, 50)">50$</button>
                <button class="q-btn" onclick="setQuick(1, 100)">100$</button>
                <button class="q-btn" onclick="setQuick(1, 500)">500$</button>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ── STATE ──
  let token = null, username = null, balance = 0, sessionStart = 0;
  let gamePhase = 'waiting';
  let hasBet = false, hasBet2 = false;
  let currentBet = 0, currentBet2 = 0;
  let currentMult = 1.0;
  let autoEnabled = false, autoBetEnabled = false;
  let lastBetAmount = 0, lastBetAmount2 = 0;
  let activeBetPanel = 1;
  let personalHistory = [];
  let bestCashout = 0;
  let streak = 0;

  const socket = io();

  // ── AUDIO ──
  let soundEnabled = true;
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function toggleSound() {
    soundEnabled = !soundEnabled;
    const btn = document.getElementById('sound-btn');
    btn.textContent = soundEnabled ? '🔊' : '🔇';
    btn.style.opacity = soundEnabled ? '1' : '0.5';
    if (!soundEnabled && engineOsc) stopEngine();
  }

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
  }

  let engineOsc = null, engineGain = null;

  function startEngine(mult) {
    if (!soundEnabled) return;
    try {
      const ctx = getAudioCtx();
      if (engineOsc) { engineOsc.stop(); engineOsc = null; }
      engineOsc = ctx.createOscillator();
      engineGain = ctx.createGain();
      engineOsc.type = 'sawtooth';
      engineOsc.frequency.value = 80 + (mult - 1) * 12;
      engineGain.gain.value = 0.03;
      engineOsc.connect(engineGain);
      engineGain.connect(ctx.destination);
      engineOsc.start();
    } catch(e) {}
  }

  function updateEngine(mult) {
    if (!engineOsc) return;
    try {
      engineOsc.frequency.value = 80 + (mult - 1) * 12;
    } catch(e) {}
  }

  function stopEngine() {
    if (engineOsc) {
      try {
        engineGain.gain.linearRampToValueAtTime(0, getAudioCtx().currentTime + 0.3);
        setTimeout(() => { if (engineOsc) { try { engineOsc.stop(); } catch(e){} engineOsc = null; } }, 400);
      } catch(e) {}
    }
  }

  function playCrashSound() {
    if (!soundEnabled) return;
    try {
      stopEngine();
      const ctx = getAudioCtx();
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2) * 0.4;
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const g = ctx.createGain(); g.gain.value = 1;
      src.connect(g); g.connect(ctx.destination);
      src.start();
    } catch(e) {}
  }

  function playCashoutSound() {
    if (!soundEnabled) return;
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
      g.gain.setValueAtTime(0.2, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.3);
    } catch(e) {}
  }

  function playBetSound() {
    if (!soundEnabled) return;
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 440;
      g.gain.setValueAtTime(0.1, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
  }

  // ── CANVAS ──
  const canvas = document.getElementById('flight-canvas');
  const ctx2d = canvas.getContext('2d');

  // Stars background
  let stars = [];
  function initStars() {
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.3,
        speed: Math.random() * 0.4 + 0.1,
        alpha: Math.random() * 0.5 + 0.2
      });
    }
  }

  // Particles trail
  let particles = [];

  function addParticles(px, py, mult) {
    const count = 3;
    for (let i = 0; i < count; i++) {
      particles.push({
        x: px,
        y: py,
        vx: (Math.random() - 0.5) * 2 - mult * 0.3,
        vy: (Math.random() - 1) * 1.5,
        life: 1,
        decay: Math.random() * 0.05 + 0.03,
        r: Math.random() * 3 + 1,
        hue: 140 + Math.random() * 40
      });
    }
  }

  function updateParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.life -= p.decay;
    });
  }

  function drawParticles() {
    particles.forEach(p => {
      const radius = p.r * p.life;
      if (radius <= 0) return;
      ctx2d.beginPath();
      ctx2d.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx2d.fillStyle = `hsla(${p.hue}, 100%, 60%, ${p.life * 0.8})`;
      ctx2d.fill();
    });
  }

  function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    initStars();
  }
  resizeCanvas();
  window.addEventListener('resize', () => { resizeCanvas(); resetCanvas(); });

  // Crash explosion
  let explosionParticles = [];
  let explosionTime = 0;

  function triggerExplosion(px, py) {
    explosionParticles = [];
    for (let i = 0; i < 80; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 6 + 2;
      explosionParticles.push({
        x: px, y: py,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: Math.random() * 0.03 + 0.015,
        r: Math.random() * 5 + 2,
        hue: Math.random() * 60 + 0  // red-orange
      });
    }
    explosionTime = 60;
  }

  function drawExplosion() {
    if (explosionTime <= 0) return;
    explosionTime--;
    explosionParticles = explosionParticles.filter(p => p.life > 0);
    explosionParticles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.15;
      p.vx *= 0.97;
      p.life -= p.decay;
      const radius = p.r * p.life;
      if (radius <= 0) return;
      ctx2d.beginPath();
      ctx2d.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx2d.fillStyle = `hsla(${p.hue}, 100%, 60%, ${p.life})`;
      ctx2d.fill();
    });
  }

  // Flight path points for curved trajectory
  let flightPoints = [];

  function getCurvePos(progress) {
    const w = canvas.width, h = canvas.height;
    const margin = 30;
    // Exponential curve: starts shallow, gets steep
    const t = Math.pow(progress, 0.7);
    const px = margin + t * (w - margin * 2);
    const py = (h - margin) - Math.pow(progress, 0.5) * (h - margin * 2);
    return { px, py };
  }

  function drawStars(flying) {
    stars.forEach(s => {
      if (flying && gamePhase === 'flying') {
        s.x -= s.speed * currentMult * 0.3;
        if (s.x < 0) s.x = canvas.width;
      }
      ctx2d.beginPath();
      ctx2d.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx2d.fillStyle = `rgba(255,255,255,${s.alpha})`;
      ctx2d.fill();
    });
  }

  function drawGrid() {
    const w = canvas.width, h = canvas.height;
    ctx2d.strokeStyle = '#0f0f28';
    ctx2d.lineWidth = 1;
    for (let x = 0; x < w; x += 45) {
      ctx2d.beginPath(); ctx2d.moveTo(x, 0); ctx2d.lineTo(x, h); ctx2d.stroke();
    }
    for (let y = 0; y < h; y += 38) {
      ctx2d.beginPath(); ctx2d.moveTo(0, y); ctx2d.lineTo(w, y); ctx2d.stroke();
    }
  }

  function drawFlight(mult) {
    const w = canvas.width, h = canvas.height;
    ctx2d.clearRect(0, 0, w, h);
    drawGrid();
    drawStars(true);

    const progress = Math.min(Math.log(Math.max(mult, 1)) / Math.log(14), 1);
    const { px, py } = getCurvePos(progress);

    // Record trail point
    flightPoints.push({ x: px, y: py });
    if (flightPoints.length > 300) flightPoints.shift();

    // Draw trail
    if (flightPoints.length > 1) {
      // Glow underneath
      ctx2d.beginPath();
      ctx2d.moveTo(flightPoints[0].x, flightPoints[0].y);
      for (let i = 1; i < flightPoints.length; i++) {
        ctx2d.lineTo(flightPoints[i].x, flightPoints[i].y);
      }
      ctx2d.lineTo(px, h - 30);
      ctx2d.lineTo(flightPoints[0].x, h - 30);
      ctx2d.closePath();
      const fill = ctx2d.createLinearGradient(0, py, 0, h - 30);
      fill.addColorStop(0, 'rgba(0,240,160,0.08)');
      fill.addColorStop(1, 'rgba(0,240,160,0)');
      ctx2d.fillStyle = fill;
      ctx2d.fill();

      // Glow line
      ctx2d.beginPath();
      ctx2d.moveTo(flightPoints[0].x, flightPoints[0].y);
      for (let i = 1; i < flightPoints.length; i++) {
        ctx2d.lineTo(flightPoints[i].x, flightPoints[i].y);
      }
      ctx2d.strokeStyle = 'rgba(0,240,160,0.15)';
      ctx2d.lineWidth = 12;
      ctx2d.lineCap = 'round';
      ctx2d.stroke();

      // Main line
      ctx2d.beginPath();
      ctx2d.moveTo(flightPoints[0].x, flightPoints[0].y);
      for (let i = 1; i < flightPoints.length; i++) {
        ctx2d.lineTo(flightPoints[i].x, flightPoints[i].y);
      }
      const lineGrad = ctx2d.createLinearGradient(flightPoints[0].x, flightPoints[0].y, px, py);
      lineGrad.addColorStop(0, '#00aa66');
      lineGrad.addColorStop(1, '#00f0a0');
      ctx2d.strokeStyle = lineGrad;
      ctx2d.lineWidth = 2.5;
      ctx2d.stroke();
    }

    // Particles trail (drawn BEFORE multiplier and plane)
    if (gamePhase === 'flying') {
      addParticles(px, py, mult);
    }
    updateParticles();
    drawParticles();

    // Explosion (drawn BEFORE multiplier and plane)
    drawExplosion();

    // Multiplier text on canvas — below plane
    drawMultiplierOnCanvas();

    // Plane LAST — always on top
    drawPlane(px, py, progress);
  }

  function drawMultiplierOnCanvas() {
    const w = canvas.width, h = canvas.height;
    const multEl = document.getElementById('multiplier');
    const text = multEl.textContent;
    const colorAttr = multEl.style.color || '';

    let fillColor = '#00f0a0'; // default green
    if (colorAttr.includes('red') || colorAttr === '#ff3a5c') fillColor = '#ff3a5c';
    else if (colorAttr.includes('green') || colorAttr === '#00f0a0') fillColor = '#00f0a0';

    const fontSize = Math.max(28, Math.min(60, w * 0.09));
    ctx2d.save();
    ctx2d.font = `700 ${fontSize}px 'Space Mono', monospace`;
    ctx2d.textAlign = 'center';
    ctx2d.textBaseline = 'middle';
    // Soft glow
    ctx2d.globalAlpha = 0.15;
    ctx2d.fillStyle = fillColor;
    for (let d = 8; d >= 2; d -= 2) {
      ctx2d.fillText(text, w / 2 + d, h / 2);
      ctx2d.fillText(text, w / 2 - d, h / 2);
      ctx2d.fillText(text, w / 2, h / 2 + d);
      ctx2d.fillText(text, w / 2, h / 2 - d);
    }
    ctx2d.globalAlpha = 1;
    ctx2d.fillStyle = fillColor;
    ctx2d.fillText(text, w / 2, h / 2);
    ctx2d.textAlign = 'left';
    ctx2d.textBaseline = 'alphabetic';
    ctx2d.restore();
  }

  function drawPlane(px, py, progress) {
    ctx2d.save();
    ctx2d.translate(px, py);

    // Angle based on curve tangent — smooth over last few points
    let angle = 0;
    if (flightPoints.length >= 2) {
      const last = flightPoints[flightPoints.length - 1];
      const prev = flightPoints[Math.max(0, flightPoints.length - 6)];
      angle = Math.atan2(last.y - prev.y, last.x - prev.x);
    }
    ctx2d.rotate(angle);

    // Stable glow: fixed radial gradient, no randomness, no shadowBlur
    const size = Math.max(20, Math.min(28, canvas.width / 22));
    const glowR = ctx2d.createRadialGradient(0, 0, 0, 0, 0, size * 1.2);
    glowR.addColorStop(0, 'rgba(0,240,160,0.25)');
    glowR.addColorStop(1, 'rgba(0,240,160,0)');
    ctx2d.fillStyle = glowR;
    ctx2d.beginPath();
    ctx2d.arc(0, 0, size * 1.2, 0, Math.PI * 2);
    ctx2d.fill();

    // Draw plane emoji — no shadow to prevent flicker
    ctx2d.shadowBlur = 0;
    ctx2d.font = `${size}px serif`;
    ctx2d.fillText('✈️', -size / 2, size / 3);

    ctx2d.restore();
  }

  function resetCanvas() {
    const w = canvas.width, h = canvas.height;
    flightPoints = [];
    particles = [];
    ctx2d.clearRect(0, 0, w, h);
    drawGrid();
    drawStars(false);
    drawMultiplierOnCanvas();
    ctx2d.shadowBlur = 0;
    ctx2d.font = '24px serif';
    ctx2d.fillText('✈️', 20, h - 20);
  }

  let animFrame = null;
  function crashedCanvas(px, py) {
    playCrashSound();
    triggerExplosion(px, py);

    function loop() {
      drawFlight(currentMult);
      if (explosionTime > 0) animFrame = requestAnimationFrame(loop);
    }
    loop();
  }

  // ── BET CONTROLS ──
  function showBetPanel(n) {
    activeBetPanel = n;
    document.getElementById('panel-bet1').classList.toggle('visible', n === 1);
    document.getElementById('panel-bet2').classList.toggle('visible', n === 2);
    document.getElementById('tab-bet1').className = 'bet-tab' + (n === 1 ? ' active' : '');
    document.getElementById('tab-bet2').className = 'bet-tab' + (n === 2 ? ' active2' : '');
  }

  function getInputId(n) { return n === 1 ? 'bet-input' : 'bet-input2'; }

  function setQuick(n, val) { document.getElementById(getInputId(n)).value = val; }
  function setMax(n) { document.getElementById(getInputId(n)).value = balance; }
  function halveBet(n) {
    const id = getInputId(n);
    const v = parseFloat(document.getElementById(id).value) || 0;
    document.getElementById(id).value = Math.max(1, Math.floor(v / 2));
  }
  function doubleBet(n) {
    const id = getInputId(n);
    const v = parseFloat(document.getElementById(id).value) || 0;
    document.getElementById(id).value = Math.min(balance, v * 2);
  }

  function toggleAuto() {
    autoEnabled = !autoEnabled;
    document.getElementById('auto-toggle').classList.toggle('on', autoEnabled);
  }
  function toggleAutoBet() {
    autoBetEnabled = !autoBetEnabled;
    document.getElementById('autobet-toggle').classList.toggle('on', autoBetEnabled);
  }

  // ── UI ──
  function showMsg(msg, color) {
    const el = document.getElementById('message');
    el.textContent = msg;
    el.style.color = color;
    setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 3000);
  }

  function updateBtn() {
    // Btn 1
    const btn1 = document.getElementById('main-btn');
    if (gamePhase === 'betting' && !hasBet) {
      btn1.textContent = '✅ MISER'; btn1.style.background = 'var(--green)'; btn1.style.color = '#000'; btn1.disabled = false;
    } else if (gamePhase === 'betting' && hasBet) {
      btn1.textContent = '⏳ EN ATTENTE'; btn1.style.background = '#0a2a18'; btn1.style.color = 'var(--green)'; btn1.disabled = true;
    } else if (gamePhase === 'flying' && hasBet) {
      btn1.textContent = '💸 CASHOUT'; btn1.style.background = 'var(--red)'; btn1.style.color = '#fff'; btn1.disabled = false;
    } else {
      btn1.textContent = '🚀 EN VOL'; btn1.style.background = 'var(--surface2)'; btn1.style.color = 'var(--muted)'; btn1.disabled = true;
    }
    // Btn 2
    const btn2 = document.getElementById('main-btn2');
    if (gamePhase === 'betting' && !hasBet2) {
      btn2.textContent = '✅ MISER 2'; btn2.style.background = 'var(--blue)'; btn2.style.color = '#fff'; btn2.disabled = false;
    } else if (gamePhase === 'betting' && hasBet2) {
      btn2.textContent = '⏳ EN ATTENTE'; btn2.style.background = '#0a1535'; btn2.style.color = 'var(--blue)'; btn2.disabled = true;
    } else if (gamePhase === 'flying' && hasBet2) {
      btn2.textContent = '💸 CASHOUT 2'; btn2.style.background = 'var(--blue)'; btn2.style.color = '#fff'; btn2.disabled = false;
    } else {
      btn2.textContent = '🚀 EN VOL'; btn2.style.background = 'var(--surface2)'; btn2.style.color = 'var(--muted)'; btn2.disabled = true;
    }
  }

  function mainAction(n) {
    if (n === 1) {
      if (gamePhase === 'betting' && !hasBet) {
        const amount = parseFloat(document.getElementById('bet-input').value);
        if (!amount || amount <= 0) return showMsg('❌ Mise invalide', 'var(--red)');
        const amount2val = parseFloat(document.getElementById('bet-input2').value) || 0;
        const total = amount + amount2val;
        if (total > balance) return showMsg('❌ Solde insuffisant', 'var(--red)');
        lastBetAmount = amount; lastBetAmount2 = amount2val;
        socket.emit('place_bet', { token, amount, amount2: amount2val > 0 ? amount2val : 0 });
      } else if (gamePhase === 'flying' && hasBet) {
        socket.emit('cashout', { token, which: 1 });
      }
    } else {
      if (gamePhase === 'betting' && !hasBet2) {
        // If bet1 already placed, add bet2 separately isn't possible in current server model
        // Just set the amount2 field
        showMsg('ℹ️ Renseigne les deux mises puis clique Miser 1', 'var(--blue)');
        showBetPanel(1);
      } else if (gamePhase === 'flying' && hasBet2) {
        socket.emit('cashout', { token, which: 2 });
      }
    }
  }

  // ── STATS ──
  let chartHistory = []; // recent profits for mini chart

  function updateStats() {
    const pnl = balance - sessionStart;
    const el = document.getElementById('stat-pnl');
    if (el) {
      el.textContent = (pnl >= 0 ? '+' : '') + pnl.toFixed(0) + ' $';
      el.className = 'stat-value ' + (pnl >= 0 ? '' : 'red');
    }
    const best = document.getElementById('stat-best');
    if (best) best.textContent = bestCashout > 0 ? bestCashout.toFixed(2) + 'x' : '—';
    const streakEl = document.getElementById('stat-streak');
    if (streakEl) streakEl.textContent = streak;
    drawMiniChart();
  }

  function drawMiniChart() {
    const c = document.getElementById('mini-chart');
    if (!c) return;
    c.width = c.offsetWidth || 180;
    c.height = 60;
    const cx = c.getContext('2d');
    cx.clearRect(0, 0, c.width, c.height);
    if (chartHistory.length < 2) {
      cx.fillStyle = '#2a2a5a';
      cx.font = '10px monospace';
      cx.fillText('pas assez de données', 8, 30);
      return;
    }
    const max = Math.max(...chartHistory, 0);
    const min = Math.min(...chartHistory, 0);
    const range = max - min || 1;
    const w = c.width, h = c.height;
    const step = w / (chartHistory.length - 1);

    cx.beginPath();
    chartHistory.forEach((v, i) => {
      const x = i * step;
      const y = h - ((v - min) / range) * (h - 10) - 5;
      i === 0 ? cx.moveTo(x, y) : cx.lineTo(x, y);
    });
    // Fill
    cx.lineTo(w, h); cx.lineTo(0, h); cx.closePath();
    const grad = cx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, 'rgba(0,240,160,0.25)');
    grad.addColorStop(1, 'rgba(0,240,160,0)');
    cx.fillStyle = grad;
    cx.fill();

    cx.beginPath();
    chartHistory.forEach((v, i) => {
      const x = i * step;
      const y = h - ((v - min) / range) * (h - 10) - 5;
      i === 0 ? cx.moveTo(x, y) : cx.lineTo(x, y);
    });
    cx.strokeStyle = '#00f0a0';
    cx.lineWidth = 1.5;
    cx.stroke();
  }

  function renderPersonalHistory(hist) {
    const el = document.getElementById('personal-history');
    if (!el) return;
    el.innerHTML = '';
    const reversed = [...hist].reverse();
    reversed.forEach(entry => {
      const div = document.createElement('div');
      const win = entry.profit > 0;
      div.className = 'history-entry ' + (win ? 'win' : 'loss');
      const cashoutStr = entry.cashout ? entry.cashout.toFixed(2) + 'x' : '—';
      const cashout2Str = entry.cashout2 ? ' / ' + entry.cashout2.toFixed(2) + 'x' : '';
      div.innerHTML = `
        <span class="he-crash">💥${entry.crashAt ? entry.crashAt.toFixed(2) : '?'}x</span>
        <span style="color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.65rem;">${cashoutStr}${cashout2Str}</span>
        <span class="he-profit ${win ? 'pos' : 'neg'}">${win ? '+' : ''}${entry.profit.toFixed(0)}$</span>
      `;
      el.appendChild(div);
    });
    // Mobile stats
    const mEl = document.getElementById('mobile-tab-stats');
    if (mEl) mEl.innerHTML = el.parentElement.parentElement.outerHTML;
  }

  // ── EMOJI ──
  function spawnEmojiBubble(username, emoji) {
    const box = document.querySelector('.flight-box');
    const el = document.createElement('div');
    el.className = 'emoji-bubble';
    el.textContent = username + ' : ' + emoji;
    el.style.left = (5 + Math.random() * 60) + '%';
    el.style.bottom = (15 + Math.random() * 30) + 'px';
    box.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function spawnCashoutNotif(username, mult) {
    playCashoutSound();
    const box = document.querySelector('.flight-box');
    const el = document.createElement('div');
    el.className = 'cashout-notif';
    const top = 40 + (Math.random() * 50);
    el.style.top = top + '%';
    el.textContent = '💸 ' + username + ' x' + mult.toFixed(2);
    box.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }

  // ── TABS ──
  function switchTab(tab) {
    const tabs = ['bets','leaderboard','players','stats'];
    document.querySelectorAll('.sidebar .tab-btn').forEach((b, i) => {
      b.classList.toggle('active', tabs[i] === tab);
    });
    document.querySelectorAll('.sidebar .tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'stats') updateStats();
  }

  function switchMobileTab(tab) {
    const tabs = ['bets','leaderboard','players','stats'];
    document.querySelectorAll('.mobile-tab-btn').forEach((b, i) => {
      b.classList.toggle('active', tabs[i] === tab);
    });
    document.querySelectorAll('.mobile-tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('mobile-tab-' + tab).classList.add('active');
    if (tab === 'stats') updateStats();
  }

  function renderBetItem(b) {
    const div = document.createElement('div');
    div.className = 'bet-item' + (b.cashedOut || b.cashedOut2 ? ' cashed' : '');
    const st1 = b.cashedOut ? '✅ ' + b.multiplier.toFixed(2) + 'x' : '🎯';
    const st2 = b.amount2 ? (b.cashedOut2 ? ' / ✅' + b.multiplier2.toFixed(2) + 'x' : ' / 🎯') : '';
    div.innerHTML = `
      <span class="bet-user">${b.username}</span>
      <span class="bet-amount">${b.amount}${b.amount2 ? '+'+b.amount2 : ''}$</span>
      <span class="bet-status">${st1}${st2}</span>
    `;
    return div;
  }

  function updateBetsList(bets) {
    ['tab-bets', 'mobile-tab-bets'].forEach(id => {
      const el = document.getElementById(id);
      if (!bets || !bets.length) { el.innerHTML = '<span class="empty-msg">Aucune mise</span>'; return; }
      el.innerHTML = '';
      bets.forEach(b => el.appendChild(renderBetItem(b)));
    });
  }

  function updateLeaderboard(lb) {
    ['tab-leaderboard', 'mobile-tab-leaderboard'].forEach(id => {
      const el = document.getElementById(id);
      el.innerHTML = '';
      const medals = ['🥇','🥈','🥉'];
      lb.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'lb-item';
        div.innerHTML = `
          <span class="lb-rank">${medals[i] || (i+1)}</span>
          <span class="lb-name ${p.username === username ? 'me' : ''}">${p.username}</span>
          <span class="lb-balance">${p.balance}$</span>
        `;
        el.appendChild(div);
      });
    });
  }

  function updatePlayers(players) {
    ['tab-players', 'mobile-tab-players'].forEach(id => {
      const el = document.getElementById(id);
      el.innerHTML = '';
      players.forEach(p => {
        const div = document.createElement('div');
        div.className = 'player-item';
        div.innerHTML = `<div class="player-dot"></div><span class="player-name ${p === username ? 'me' : ''}">${p === username ? '⭐ '+p : p}</span>`;
        el.appendChild(div);
      });
    });
  }

  function updateCrashHistory(history) {
    const el = document.getElementById('crash-history');
    el.innerHTML = '';
    history.forEach(val => {
      const b = document.createElement('span');
      b.className = 'crash-badge ' + (val < 2 ? 'crash-low' : val < 5 ? 'crash-mid' : 'crash-high');
      b.textContent = val.toFixed(2) + 'x';
      el.appendChild(b);
    });
  }

  // ── AUTH ──
  async function doLogin() {
    const u = document.getElementById('input-username').value.trim();
    const p = document.getElementById('input-password').value;
    if (!u || !p) return;
    const res = await fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
    const data = await res.json();
    if (data.error) { document.getElementById('auth-error').textContent = data.error; return; }
    token = data.token; username = u; balance = data.balance;
    personalHistory = data.history || [];
    bestCashout = data.bestCashout || 0;
    streak = data.streak || 0;
    enterGame();
  }

  async function doRegister() {
    const u = document.getElementById('input-username').value.trim();
    const p = document.getElementById('input-password').value;
    if (!u || !p) return;
    const res = await fetch('/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
    const data = await res.json();
    if (data.error) { document.getElementById('auth-error').textContent = data.error; return; }
    token = data.token; username = u; balance = data.balance;
    personalHistory = []; bestCashout = 0; streak = 0;
    enterGame();
  }

  // Enter on password field
  document.getElementById('input-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function enterGame() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    document.getElementById('username-display').textContent = '👤 ' + username;
    sessionStart = balance;
    socket.emit('identify', { token });
    setTimeout(() => { resizeCanvas(); resetCanvas(); }, 80);
    updateBtn();
    updateStats();
    renderPersonalHistory(personalHistory);
  }

  // ── SOCKET ──
  let countdownInterval = null;

  socket.on('betting_phase', (data) => {
    gamePhase = 'betting'; hasBet = false; hasBet2 = false; currentMult = 1.0;
    document.getElementById('multiplier').textContent = '1.00x';
    document.getElementById('multiplier').style.color = 'var(--green)';
    document.getElementById('multiplier').style.textShadow = '0 0 40px var(--green-dim)';
    document.getElementById('status-text').textContent = '⏳ PHASE DE MISE';
    document.getElementById('bet-info').textContent = '';
    resetCanvas();
    updateBtn();

    // Auto-bet
    if (autoBetEnabled && lastBetAmount > 0 && token) {
      setTimeout(() => {
        if (gamePhase === 'betting' && !hasBet) {
          socket.emit('place_bet', { token, amount: lastBetAmount, amount2: lastBetAmount2 > 0 ? lastBetAmount2 : 0 });
        }
      }, 500);
    }

    if (countdownInterval) clearInterval(countdownInterval);
    let sec = Math.ceil((data.duration || 5000) / 1000);
    document.getElementById('countdown').textContent = '🕐 ' + sec + 's';
    countdownInterval = setInterval(() => {
      sec--;
      if (sec <= 0) { clearInterval(countdownInterval); document.getElementById('countdown').textContent = ''; }
      else document.getElementById('countdown').textContent = '🕐 ' + sec + 's';
    }, 1000);
  });

  socket.on('game_start', () => {
    gamePhase = 'flying';
    document.getElementById('status-text').textContent = '🚀 EN VOL';
    document.getElementById('countdown').textContent = '';
    if (countdownInterval) clearInterval(countdownInterval);
    startEngine(1.0);
    updateBtn();
  });

  socket.on('multiplier_update', (data) => {
    currentMult = parseFloat(data.multiplier);
    document.getElementById('multiplier').textContent = currentMult.toFixed(2) + 'x';
    drawFlight(currentMult);
    updateEngine(currentMult);

    if (hasBet || hasBet2) {
      let parts = [];
      if (hasBet) parts.push(currentBet + '$ → ' + (currentBet * currentMult).toFixed(0) + '$');
      if (hasBet2) parts.push(currentBet2 + '$ → ' + (currentBet2 * currentMult).toFixed(0) + '$');
      document.getElementById('bet-info').textContent = parts.join('  |  ');

      // Auto cashout
      if (autoEnabled) {
        const target = parseFloat(document.getElementById('auto-cashout-input').value);
        if (target && currentMult >= target) {
          if (hasBet) socket.emit('cashout', { token, which: 1 });
          if (hasBet2) socket.emit('cashout', { token, which: 2 });
        }
      }
    }
  });

  socket.on('game_crash', (data) => {
    gamePhase = 'crashed'; stopEngine();
    document.getElementById('multiplier').textContent = '💥 ' + data.crashAt.toFixed(2) + 'x';
    document.getElementById('multiplier').style.color = 'var(--red)';
    document.getElementById('multiplier').style.textShadow = '0 0 40px var(--red-dim)';
    document.getElementById('status-text').textContent = '💥 CRASH !';
    hasBet = false; hasBet2 = false;
    updateBtn();
    if (data.crashHistory) updateCrashHistory(data.crashHistory);
    // Trigger explosion at plane position
    const progress = Math.min(Math.log(Math.max(data.crashAt, 1)) / Math.log(14), 1);
    const { px, py } = getCurvePos(progress);
    crashedCanvas(px, py);
  });

  socket.on('crash_history', d => updateCrashHistory(d.crashHistory));
  socket.on('lost', () => showMsg('💥 PERDU !', 'var(--red)'));

  socket.on('bet_placed', (data) => {
    balance = data.balance;
    currentBet = data.amount; hasBet = true;
    if (data.amount2) { currentBet2 = data.amount2; hasBet2 = true; }
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    document.getElementById('bet-info').textContent = '🎯 ' + currentBet + (data.amount2 ? ' + ' + data.amount2 : '') + '$';
    showMsg('✅ Mise placée !', 'var(--green)');
    playBetSound();
    updateBtn();
  });

  socket.on('cashout_success', (data) => {
    balance = data.balance;
    if (data.which === 1) hasBet = false;
    else hasBet2 = false;
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    showMsg('💸 x' + data.multiplier.toFixed(2) + ' +' + data.profit.toFixed(0) + '$', 'var(--green)');
    // Update chart
    chartHistory.push(data.profit);
    if (chartHistory.length > 30) chartHistory.shift();
    updateStats();
    updateBtn();
  });

  socket.on('cashout_event', (data) => {
    spawnCashoutNotif(data.username, data.multiplier);
  });

  socket.on('personal_stats', (data) => {
    personalHistory = data.history || [];
    bestCashout = data.bestCashout || bestCashout;
    streak = data.streak || streak;
    renderPersonalHistory(personalHistory);
    updateStats();
    updateBalance();
  });

  function updateBalance() {
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
  }

  socket.on('bet_error', d => showMsg('❌ ' + d.message, 'var(--red)'));
  socket.on('cashout_error', d => showMsg('❌ ' + d.message, 'var(--red)'));
  socket.on('bets_update', d => updateBetsList(d.activeBets));

  socket.on('lobby_update', (data) => {
    document.getElementById('connected-count').textContent = '👥 ' + data.connectedCount;
    updateLeaderboard(data.leaderboard);
    updatePlayers(data.connectedUsers);
    updateBetsList(data.activeBets);
  });

  socket.on('emoji_received', d => spawnEmojiBubble(d.username, d.emoji));

  function sendEmoji(emoji) {
    if (!token) return;
    socket.emit('send_emoji', { token, emoji });
  }
</script>
</body>
</html>
