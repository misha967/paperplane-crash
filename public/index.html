<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Paperplane Crash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    h1 { font-size: 2rem; margin-bottom: 20px; color: #e94560; }
    #game-area { background: #16213e; padding: 40px; border-radius: 15px; text-align: center; width: 420px; }
    #multiplier { font-size: 4rem; font-weight: bold; color: #00ff88; margin: 20px 0; }
    #status { font-size: 1rem; color: #aaa; margin-bottom: 10px; }
    input { padding: 10px; border-radius: 8px; border: none; margin: 5px; width: 180px; }
    button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; margin: 5px; font-weight: bold; }
    #btn-bet { background: #e94560; color: white; }
    #btn-cashout { background: #00ff88; color: black; }
    #btn-login { background: #0f3460; color: white; }
    #btn-register { background: #533483; color: white; }
    #balance { font-size: 1.2rem; margin-top: 15px; color: #ffd700; }
    #message { margin-top: 10px; color: #00ff88; min-height: 20px; }
    #auth-area { margin-bottom: 20px; }

    /* TRACK */
    #track-container {
      width: 380px;
      margin: 30px auto;
      position: relative;
      height: 80px;
    }
    #track-labels {
      display: flex;
      justify-content: space-between;
      color: #aaa;
      font-size: 0.8rem;
      margin-bottom: 4px;
    }
    #track-line-wrapper {
      position: relative;
      height: 6px;
      margin-top: 20px;
    }
    #track-green {
      position: absolute;
      left: 0;
      top: 0;
      height: 6px;
      background: #00ff88;
      border-radius: 3px;
      width: 0%;
      transition: width 0.1s linear;
    }
    #track-red {
      position: absolute;
      top: 0;
      height: 6px;
      background: #e94560;
      border-radius: 3px;
      right: 0;
      width: 100%;
      transition: width 0.1s linear;
    }
    #track-dot-left {
      position: absolute;
      left: -6px;
      top: -5px;
      width: 14px;
      height: 14px;
      background: #333;
      border: 2px solid #aaa;
      border-radius: 50%;
    }
    #track-dot-right {
      position: absolute;
      right: -6px;
      top: -5px;
      width: 14px;
      height: 14px;
      background: #333;
      border: 2px solid #aaa;
      border-radius: 50%;
    }
    #plane {
      position: absolute;
      top: -22px;
      font-size: 1.6rem;
      transform: scaleX(1);
      transition: left 0.1s linear;
      left: 0%;
    }
    #plane-label {
      position: absolute;
      top: 16px;
      font-size: 0.75rem;
      background: #00ff88;
      color: black;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: bold;
      transition: left 0.1s linear;
      left: 0%;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>
  <h1>✈️ Paperplane Crash</h1>

  <!-- TRACK VISUEL -->
  <div id="track-container">
    <div id="track-labels">
      <span>0</span>
      <span>100</span>
    </div>
    <div id="track-line-wrapper">
      <div id="track-dot-left"></div>
      <div id="track-green"></div>
      <div id="track-red"></div>
      <div id="track-dot-right"></div>
      <div id="plane">🛩️</div>
      <div id="plane-label">1.00x</div>
    </div>
  </div>

  <div id="game-area">
    <div id="auth-area">
      <input type="text" id="username" placeholder="Nom d'utilisateur" />
      <input type="password" id="password" placeholder="Mot de passe" />
      <br>
      <button id="btn-register" onclick="register()">S'inscrire</button>
      <button id="btn-login" onclick="login()">Se connecter</button>
    </div>

    <div id="play-area" style="display:none">
      <div id="status">En attente...</div>
      <div id="multiplier">1.00x</div>
      <input type="number" id="bet-amount" placeholder="Mise" min="1" value="10" />
      <br>
      <button id="btn-bet" onclick="placeBet()">Miser</button>
      <button id="btn-cashout" onclick="cashout()">Cashout 💰</button>
      <div id="balance">Solde : 1000</div>
      <div id="message"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let token = null;
    let balance = 0;

    // Convertit le multiplicateur (1x → 10x+) en pourcentage (0% → 100%)
    function multToPercent(mult) {
      // 1x = 0%, 10x = 100% (logarithmique)
      const pct = Math.min(100, ((Math.log(mult) / Math.log(10)) * 100));
      return Math.max(0, pct);
    }

    function updatePlane(mult) {
      const pct = multToPercent(mult);
      const plane = document.getElementById('plane');
      const label = document.getElementById('plane-label');
      const green = document.getElementById('track-green');
      const red = document.getElementById('track-red');

      plane.style.left = pct + '%';
      label.style.left = pct + '%';
      label.textContent = mult + 'x';
      green.style.width = pct + '%';
      red.style.width = (100 - pct) + '%';
      red.style.left = pct + '%';
    }

    function resetPlane() {
      updatePlane(1.00);
      document.getElementById('plane-label').style.background = '#00ff88';
    }

    function register() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      }).then(r => r.json()).then(data => {
        if (data.error) alert(data.error);
        else alert('Inscription réussie ! Connecte-toi.');
      });
    }

    function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      }).then(r => r.json()).then(data => {
        if (data.error) alert(data.error);
        else {
          token = data.token;
          balance = data.balance;
          document.getElementById('auth-area').style.display = 'none';
          document.getElementById('play-area').style.display = 'block';
          document.getElementById('balance').textContent = 'Solde : ' + balance;
        }
      });
    }

    function placeBet() {
      const amount = parseFloat(document.getElementById('bet-amount').value);
      socket.emit('place_bet', { token, amount });
    }

    function cashout() {
      socket.emit('cashout', { token });
    }

    socket.on('game_start', () => {
      document.getElementById('status').textContent = '🚀 En cours !';
      document.getElementById('multiplier').style.color = '#00ff88';
      document.getElementById('message').textContent = '';
      document.getElementById('plane-label').style.background = '#00ff88';
      resetPlane();
    });

    socket.on('multiplier_update', (data) => {
      const mult = data.multiplier;
      document.getElementById('multiplier').textContent = mult + 'x';
      updatePlane(parseFloat(mult));
    });

    socket.on('game_crash', (data) => {
      document.getElementById('status').textContent = '💥 Crash à ' + data.crashAt + 'x !';
      document.getElementById('multiplier').style.color = '#e94560';
      document.getElementById('plane-label').style.background = '#e94560';
      document.getElementById('plane').textContent = '💥';
      setTimeout(() => {
        document.getElementById('plane').textContent = '🛩️';
        resetPlane();
      }, 1500);
    });

    socket.on('cashout_success', (data) => {
      balance = data.balance;
      document.getElementById('balance').textContent = 'Solde : ' + balance;
      document.getElementById('message').textContent = '✅ Cashout ! +' + data.profit;
    });
  </script>
</body>
</html>
