<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>✈️ Paperplane Crash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: #0a0a1a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ══ AUTH ══ */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      gap: 12px;
      padding: 20px;
    }
    #auth-screen h1 { font-size: 2rem; margin-bottom: 8px; text-align: center; }
    #auth-screen input {
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid #2a2a4a;
      background: #1a1a2e;
      color: #fff;
      font-size: 1rem;
      width: 100%;
      max-width: 320px;
    }
    .auth-btn {
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      width: 100%;
      max-width: 320px;
    }
    #btn-login { background: #e94560; color: #fff; }
    #btn-register { background: #1a1a2e; color: #aaa; border: 1px solid #2a2a4a; }
    #auth-error { color: #e94560; font-size: 0.85rem; text-align: center; }

    /* ══ GAME ══ */
    #game-screen { display: none; flex-direction: column; height: 100dvh; }

    /* TOP BAR */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #0d0d1f;
      border-bottom: 1px solid #1a1a3e;
      flex-shrink: 0;
      gap: 8px;
    }
    .logo { font-size: 0.95rem; font-weight: bold; white-space: nowrap; }
    .top-stats {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      justify-content: flex-end;
    }
    #connected-count { color: #aaa; font-size: 0.75rem; }
    #balance { color: #00ff88; font-weight: bold; font-size: 0.9rem; }
    #username-display { color: #aaa; font-size: 0.75rem; }

    /* HISTORY */
    .history-bar {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      background: #0a0a18;
      border-bottom: 1px solid #1a1a3e;
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .history-bar::-webkit-scrollbar { display: none; }
    .history-label { color: #444; font-size: 0.7rem; flex-shrink: 0; }
    .crash-badge {
      padding: 2px 7px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: bold;
      flex-shrink: 0;
    }
    .crash-low { background: #2a0808; color: #e94560; }
    .crash-mid { background: #0a2a0a; color: #44ff88; }
    .crash-high { background: #0a1030; color: #4499ff; }

    /* ══ MAIN ══ */
    /* Desktop: side by side | Mobile: stacked */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* LEFT = canvas + controls */
    .left-col {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    /* FLIGHT BOX */
    .flight-box {
      position: relative;
      flex: 1;
      background: #0d0d1f;
      overflow: hidden;
    }
    #flight-canvas { width: 100%; height: 100%; display: block; }

    #multiplier {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: bold;
      color: #00ff88;
      text-shadow: 0 0 30px #00ff8888;
      pointer-events: none;
      white-space: nowrap;
    }
    #status-text {
      position: absolute;
      top: 8px;
      left: 10px;
      font-size: 0.75rem;
      color: #aaa;
    }
    #countdown {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 0.85rem;
      color: #ffcc00;
      font-weight: bold;
    }
    .floating-emoji {
      position: absolute;
      font-size: 2rem;
      animation: floatUp 2s ease-out forwards;
      pointer-events: none;
      z-index: 20;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
    }

    /* ══ CONTROLS PANEL ══ */
    .controls-panel {
      background: #0d0d1f;
      border-top: 1px solid #1a1a3e;
      flex-shrink: 0;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Mise row */
    .bet-area {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    .bet-input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .amount-display {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .amount-display input {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.2rem;
      font-weight: bold;
      width: 100%;
      outline: none;
    }
    .amount-display input::placeholder { color: #444; }
    .currency { color: #ffcc00; font-weight: bold; font-size: 0.9rem; }

    .quick-row {
      display: flex;
      gap: 4px;
    }
    .q-btn {
      flex: 1;
      padding: 5px 0;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 7px;
      color: #aaa;
      font-size: 0.75rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s;
    }
    .q-btn:active { background: #2a2a5a; color: #fff; transform: scale(0.95); }

    .half-double {
      display: flex;
      gap: 4px;
    }
    .hd-btn {
      flex: 1;
      padding: 5px 0;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 7px;
      color: #aaa;
      font-size: 0.75rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s;
    }
    .hd-btn:active { background: #2a2a5a; color: #fff; transform: scale(0.95); }

    /* Cashout auto */
    .auto-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 6px 12px;
    }
    .auto-label { font-size: 0.75rem; color: #aaa; white-space: nowrap; }
    .auto-row input {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: bold;
      outline: none;
      min-width: 0;
    }
    .auto-row input::placeholder { color: #333; }
    .auto-toggle {
      width: 38px;
      height: 20px;
      background: #333;
      border-radius: 20px;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
      border: none;
    }
    .auto-toggle.on { background: #00ff88; }
    .auto-toggle::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }
    .auto-toggle.on::after { left: 20px; }

    /* MAIN BUTTON */
    #main-btn {
      padding: 13px;
      border-radius: 12px;
      border: none;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      align-self: stretch;
      min-width: 110px;
    }
    #main-btn:active { transform: scale(0.97); }

    /* Status/info */
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #bet-info { font-size: 0.8rem; color: #ffcc00; }
    #message { font-size: 0.8rem; }

    /* EMOJI */
    .emoji-row {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 1px;
    }
    .emoji-row::-webkit-scrollbar { display: none; }
    .emoji-btn {
      font-size: 1.4rem;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 5px 10px;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.1s;
    }
    .emoji-btn:active { transform: scale(1.2); }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: 220px;
      background: #0a0a18;
      border-left: 1px solid #1a1a3e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid #1a1a3e;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 2px;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.7rem;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab-btn.active { color: #fff; border-bottom-color: #e94560; }
    .tab-content {
      display: none;
      flex-direction: column;
      overflow-y: auto;
      flex: 1;
      padding: 6px;
      gap: 4px;
    }
    .tab-content.active { display: flex; }
    .empty-msg { color: #333; font-size: 0.78rem; padding: 6px; }

    .bet-item {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      border-radius: 8px;
      background: #1a1a2e;
      font-size: 0.78rem;
      gap: 4px;
    }
    .bet-item.cashed { background: #0a2a15; }
    .bet-user { font-weight: bold; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bet-amount { color: #ffcc00; flex-shrink: 0; }
    .bet-status { flex-shrink: 0; font-size: 0.75rem; }

    .lb-item {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      border-radius: 8px;
      background: #1a1a2e;
      font-size: 0.78rem;
      gap: 5px;
    }
    .lb-rank { width: 20px; text-align: center; color: #555; font-size: 0.75rem; flex-shrink: 0; }
    .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-name.me { color: #00ff88; }
    .lb-balance { color: #00ff88; font-weight: bold; flex-shrink: 0; }

    .player-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 8px;
      border-radius: 8px;
      background: #1a1a2e;
      font-size: 0.78rem;
    }
    .player-dot { width: 7px; height: 7px; border-radius: 50%; background: #00ff88; flex-shrink: 0; }
    .player-name.me { color: #00ff88; font-weight: bold; }

    /* ══ MOBILE ══ */
    @media (max-width: 640px) {
      .sidebar { display: none; }

      /* Bottom sheet style tabs */
      .mobile-tabs-wrap {
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
      }
      .mobile-tabs {
        display: flex;
        border-top: 1px solid #1a1a3e;
        background: #0a0a18;
      }
      .mobile-tab-btn {
        flex: 1;
        padding: 7px 4px;
        background: none;
        border: none;
        color: #555;
        cursor: pointer;
        font-size: 0.68rem;
        border-top: 2px solid transparent;
        transition: all 0.15s;
      }
      .mobile-tab-btn.active { color: #fff; border-top-color: #e94560; }
      .mobile-tab-content {
        display: none;
        background: #0a0a18;
        max-height: 120px;
        overflow-y: auto;
        padding: 5px 8px;
        gap: 4px;
        flex-direction: column;
        border-top: 1px solid #1a1a3e;
      }
      .mobile-tab-content.active { display: flex; }

      /* Bigger touch targets */
      .emoji-btn { font-size: 1.6rem; padding: 6px 12px; }
      #main-btn { font-size: 1rem; padding: 12px; min-width: 100px; }
    }

    @media (min-width: 641px) {
      .mobile-tabs-wrap { display: none; }
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }
  </style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="auth-screen">
  <h1>✈️ Paperplane Crash</h1>
  <input type="text" id="input-username" placeholder="Pseudo" autocomplete="off" />
  <input type="password" id="input-password" placeholder="Mot de passe" />
  <button class="auth-btn" id="btn-login" onclick="doLogin()">🔑 Connexion</button>
  <button class="auth-btn" id="btn-register" onclick="doRegister()">📝 Créer un compte</button>
  <span id="auth-error"></span>
</div>

<!-- ══ GAME ══ -->
<div id="game-screen">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">✈️ Paperplane Crash</div>
    <div class="top-stats">
      <span id="connected-count">👥 0</span>
      <span id="balance">💰 1000 $</span>
      <span id="username-display"></span>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="history-bar">
    <span class="history-label">Crashs :</span>
    <div id="crash-history" style="display:flex;gap:5px;"></div>
  </div>

  <!-- MAIN -->
  <div class="main-layout">

    <!-- LEFT -->
    <div class="left-col">

      <!-- FLIGHT -->
      <div class="flight-box">
        <canvas id="flight-canvas"></canvas>
        <div id="status-text">⏳ Phase de mise</div>
        <div id="countdown"></div>
        <div id="multiplier">1.00x</div>
      </div>

      <!-- CONTROLS -->
      <div class="controls-panel">

        <!-- BET AREA -->
        <div class="bet-area">
          <div class="bet-input-wrap">
            <!-- Amount input -->
            <div class="amount-display">
              <input type="number" id="bet-input" placeholder="0" min="1" />
              <span class="currency">$</span>
            </div>
            <!-- Quick amounts -->
            <div class="quick-row">
              <button class="q-btn" onclick="setQuick(10)">10$</button>
              <button class="q-btn" onclick="setQuick(50)">50$</button>
              <button class="q-btn" onclick="setQuick(100)">100$</button>
              <button class="q-btn" onclick="setQuick(500)">500$</button>
              <button class="q-btn" onclick="setMax()">MAX</button>
            </div>
            <!-- Half / Double -->
            <div class="half-double">
              <button class="hd-btn" onclick="halveBet()">½</button>
              <button class="hd-btn" onclick="doubleBet()">×2</button>
            </div>
          </div>

          <!-- MAIN ACTION BTN -->
          <button id="main-btn" onclick="mainAction()">✅ Miser</button>
        </div>

        <!-- AUTO CASHOUT -->
        <div class="auto-row">
          <span class="auto-label">🤖 Auto cashout à</span>
          <input type="number" id="auto-cashout-input" placeholder="ex: 2.00" step="0.1" min="1.1" />
          <span class="currency">x</span>
          <button class="auto-toggle" id="auto-toggle" onclick="toggleAuto()"></button>
        </div>

        <!-- STATUS + EMOJI -->
        <div class="status-row">
          <div class="emoji-row">
            <button class="emoji-btn" onclick="sendEmoji('💩')">💩</button>
            <button class="emoji-btn" onclick="sendEmoji('🖕')">🖕</button>
            <button class="emoji-btn" onclick="sendEmoji('🍆')">🍆</button>
            <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
            <button class="emoji-btn" onclick="sendEmoji('🔥')">🔥</button>
            <button class="emoji-btn" onclick="sendEmoji('💸')">💸</button>
            <button class="emoji-btn" onclick="sendEmoji('😱')">😱</button>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;">
            <div id="bet-info"></div>
            <div id="message"></div>
          </div>
        </div>

      </div>

      <!-- MOBILE TABS -->
      <div class="mobile-tabs-wrap">
        <div class="mobile-tabs">
          <button class="mobile-tab-btn active" onclick="switchMobileTab('bets')">🎯 Mises</button>
          <button class="mobile-tab-btn" onclick="switchMobileTab('leaderboard')">🏆 Top</button>
          <button class="mobile-tab-btn" onclick="switchMobileTab('players')">👥 Joueurs</button>
        </div>
        <div class="mobile-tab-content active" id="mobile-tab-bets">
          <span class="empty-msg">Aucune mise</span>
        </div>
        <div class="mobile-tab-content" id="mobile-tab-leaderboard"></div>
        <div class="mobile-tab-content" id="mobile-tab-players"></div>
      </div>

    </div>

    <!-- DESKTOP SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-tabs">
        <button class="tab-btn active" onclick="switchTab('bets')">🎯 Mises</button>
        <button class="tab-btn" onclick="switchTab('leaderboard')">🏆 Top</button>
        <button class="tab-btn" onclick="switchTab('players')">👥 Joueurs</button>
      </div>
      <div class="tab-content active" id="tab-bets">
        <span class="empty-msg">Aucune mise</span>
      </div>
      <div class="tab-content" id="tab-leaderboard"></div>
      <div class="tab-content" id="tab-players"></div>
    </div>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  let token = null, username = null, balance = 0;
  let gamePhase = 'waiting', hasBet = false, currentBet = 0, currentMult = 1.0;
  let autoEnabled = false;
  const socket = io();

  // ── CANVAS ──
  const canvas = document.getElementById('flight-canvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', () => { resizeCanvas(); resetCanvas(); });

  function drawGrid() {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = '#12122a';
    ctx.lineWidth = 1;
    for (let x = 0; x < w; x += 40) {
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke();
    }
    for (let y = 0; y < h; y += 35) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
    }
  }

  function drawFlight(mult) {
    const w = canvas.width, h = canvas.height;
    drawGrid();
    const progress = Math.min(Math.log(mult) / Math.log(12), 1);
    const px = progress * (w - 50) + 20;
    const py = h - (progress * (h - 50)) - 20;

    // Glow fill
    const fill = ctx.createLinearGradient(20, h-20, px, py);
    fill.addColorStop(0, '#00ff8800');
    fill.addColorStop(1, '#00ff8822');
    ctx.beginPath();
    ctx.moveTo(20, h-20);
    ctx.lineTo(px, py);
    ctx.lineTo(px, h-20);
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();

    // Line glow
    ctx.beginPath();
    ctx.strokeStyle = '#00ff8833';
    ctx.lineWidth = 10;
    ctx.moveTo(20, h-20); ctx.lineTo(px, py); ctx.stroke();

    // Line
    const grad = ctx.createLinearGradient(20, h-20, px, py);
    grad.addColorStop(0, '#00aa55');
    grad.addColorStop(1, '#00ff88');
    ctx.beginPath();
    ctx.strokeStyle = grad;
    ctx.lineWidth = 3;
    ctx.moveTo(20, h-20); ctx.lineTo(px, py); ctx.stroke();

    // Plane
    ctx.save();
    ctx.translate(px, py);
    const angle = -Math.atan2(progress*(h-50), progress*(w-50));
    ctx.rotate(angle);
    ctx.font = `${Math.max(18, Math.min(26, w/20))}px serif`;
    ctx.fillText('✈️', -12, 8);
    ctx.restore();
  }

  function resetCanvas() {
    const w = canvas.width, h = canvas.height;
    drawGrid();
    ctx.font = '22px serif';
    ctx.fillText('✈️', 15, h - 15);
  }

  // ── BET CONTROLS ──
  function setQuick(val) {
    document.getElementById('bet-input').value = val;
  }
  function setMax() {
    document.getElementById('bet-input').value = balance;
  }
  function halveBet() {
    const v = parseFloat(document.getElementById('bet-input').value) || 0;
    document.getElementById('bet-input').value = Math.max(1, Math.floor(v / 2));
  }
  function doubleBet() {
    const v = parseFloat(document.getElementById('bet-input').value) || 0;
    document.getElementById('bet-input').value = Math.min(balance, v * 2);
  }
  function toggleAuto() {
    autoEnabled = !autoEnabled;
    const btn = document.getElementById('auto-toggle');
    btn.classList.toggle('on', autoEnabled);
  }

  // ── UI ──
  function showMsg(msg, color) {
    const el = document.getElementById('message');
    el.textContent = msg;
    el.style.color = color;
  }

  function updateBtn() {
    const btn = document.getElementById('main-btn');
    const states = {
      betting_free:  { text: '✅ Miser',      bg: '#00aa55', color: '#fff',    disabled: false },
      betting_done:  { text: '⏳ En attente', bg: '#1a3a2a', color: '#00ff88', disabled: true  },
      flying_bet:    { text: '💸 CASHOUT',    bg: '#e94560', color: '#fff',    disabled: false },
      flying_nobet:  { text: '🚀 En vol',     bg: '#1a1a2e', color: '#444',    disabled: true  },
      crashed:       { text: '⏳ Prochain...',bg: '#1a1a2e', color: '#444',    disabled: true  },
    };
    let key = 'crashed';
    if (gamePhase === 'betting') key = hasBet ? 'betting_done' : 'betting_free';
    else if (gamePhase === 'flying') key = hasBet ? 'flying_bet' : 'flying_nobet';
    const s = states[key];
    btn.textContent = s.text;
    btn.style.background = s.bg;
    btn.style.color = s.color;
    btn.disabled = s.disabled;
  }

  function mainAction() {
    if (gamePhase === 'betting' && !hasBet) {
      const amount = parseFloat(document.getElementById('bet-input').value);
      if (!amount || amount <= 0) return showMsg('❌ Mise invalide', '#e94560');
      if (amount > balance) return showMsg('❌ Solde insuffisant', '#e94560');
      socket.emit('place_bet', { token, amount });
    } else if (gamePhase === 'flying' && hasBet) {
      socket.emit('cashout', { token });
    }
  }

  function sendEmoji(emoji) {
    if (!token) return;
    socket.emit('send_emoji', { token, emoji });
  }

  // ── TABS (desktop) ──
  function switchTab(tab) {
    document.querySelectorAll('.sidebar .tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['bets','leaderboard','players'][i] === tab);
    });
    document.querySelectorAll('.sidebar .tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
  }

  // ── TABS (mobile) ──
  function switchMobileTab(tab) {
    document.querySelectorAll('.mobile-tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['bets','leaderboard','players'][i] === tab);
    });
    document.querySelectorAll('.mobile-tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('mobile-tab-' + tab).classList.add('active');
  }

  function renderBetItem(b) {
    const div = document.createElement('div');
    div.className = 'bet-item' + (b.cashedOut ? ' cashed' : '');
    div.innerHTML = `
      <span class="bet-user">${b.username}</span>
      <span class="bet-amount">${b.amount}$</span>
      <span class="bet-status">${b.cashedOut ? '✅ ' + b.multiplier + 'x' : '🎯'}</span>
    `;
    return div;
  }

  function updateBetsList(bets) {
    ['tab-bets', 'mobile-tab-bets'].forEach(id => {
      const el = document.getElementById(id);
      if (!bets || !bets.length) {
        el.innerHTML = '<span class="empty-msg">Aucune mise</span>';
        return;
      }
      el.innerHTML = '';
      bets.forEach(b => el.appendChild(renderBetItem(b)));
    });
  }

  function updateLeaderboard(lb) {
    ['tab-leaderboard', 'mobile-tab-leaderboard'].forEach(id => {
      const el = document.getElementById(id);
      el.innerHTML = '';
      const medals = ['🥇','🥈','🥉'];
      lb.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'lb-item';
        div.innerHTML = `
          <span class="lb-rank">${medals[i] || (i+1)}</span>
          <span class="lb-name ${p.username === username ? 'me' : ''}">${p.username}</span>
          <span class="lb-balance">${p.balance}$</span>
        `;
        el.appendChild(div);
      });
    });
  }

  function updatePlayers(players) {
    ['tab-players', 'mobile-tab-players'].forEach(id => {
      const el = document.getElementById(id);
      el.innerHTML = '';
      players.forEach(p => {
        const div = document.createElement('div');
        div.className = 'player-item';
        div.innerHTML = `
          <div class="player-dot"></div>
          <span class="player-name ${p === username ? 'me' : ''}">${p === username ? '⭐ '+p : p}</span>
        `;
        el.appendChild(div);
      });
    });
  }

  function updateCrashHistory(history) {
    const el = document.getElementById('crash-history');
    el.innerHTML = '';
    history.forEach(val => {
      const b = document.createElement('span');
      b.className = 'crash-badge ' + (val < 2 ? 'crash-low' : val < 5 ? 'crash-mid' : 'crash-high');
      b.textContent = val.toFixed(2) + 'x';
      el.appendChild(b);
    });
  }

  function spawnEmoji(emoji) {
    const box = document.querySelector('.flight-box');
    const el = document.createElement('div');
    el.className = 'floating-emoji';
    el.textContent = emoji;
    el.style.left = (10 + Math.random() * 75) + '%';
    el.style.bottom = '20px';
    box.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }

  // ── AUTH ──
  async function doLogin() {
    const u = document.getElementById('input-username').value.trim();
    const p = document.getElementById('input-password').value;
    if (!u || !p) return;
    const res = await fetch('/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (data.error) { document.getElementById('auth-error').textContent = data.error; return; }
    token = data.token; username = u; balance = data.balance;
    enterGame();
  }

  async function doRegister() {
    const u = document.getElementById('input-username').value.trim();
    const p = document.getElementById('input-password').value;
    if (!u || !p) return;
    const res = await fetch('/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (data.error) { document.getElementById('auth-error').textContent = data.error; return; }
    token = data.token; username = u; balance = data.balance;
    enterGame();
  }

  function enterGame() {
    document.getElementById('auth-screen').style.display = 'none';
    const gs = document.getElementById('game-screen');
    gs.style.display = 'flex';
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    document.getElementById('username-display').textContent = '👤 ' + username;
    socket.emit('identify', { token });
    setTimeout(() => { resizeCanvas(); resetCanvas(); }, 80);
    updateBtn();
  }

  // ── SOCKET ──
  let countdownInterval = null;

  socket.on('betting_phase', (data) => {
    gamePhase = 'betting'; hasBet = false; currentMult = 1.0;
    document.getElementById('multiplier').textContent = '1.00x';
    document.getElementById('multiplier').style.color = '#00ff88';
    document.getElementById('multiplier').style.textShadow = '0 0 30px #00ff8888';
    document.getElementById('status-text').textContent = '⏳ Phase de mise';
    document.getElementById('bet-info').textContent = '';
    resetCanvas();
    updateBtn();

    if (countdownInterval) clearInterval(countdownInterval);
    let sec = Math.ceil((data.duration || 5000) / 1000);
    document.getElementById('countdown').textContent = '🕐 ' + sec + 's';
    countdownInterval = setInterval(() => {
      sec--;
      if (sec <= 0) { clearInterval(countdownInterval); document.getElementById('countdown').textContent = ''; }
      else document.getElementById('countdown').textContent = '🕐 ' + sec + 's';
    }, 1000);
  });

  socket.on('game_start', () => {
    gamePhase = 'flying';
    document.getElementById('status-text').textContent = '🚀 En vol !';
    document.getElementById('countdown').textContent = '';
    if (countdownInterval) clearInterval(countdownInterval);
    updateBtn();
  });

  socket.on('multiplier_update', (data) => {
    currentMult = parseFloat(data.multiplier);
    document.getElementById('multiplier').textContent = currentMult.toFixed(2) + 'x';
    drawFlight(currentMult);
    if (hasBet) {
      const pot = (currentBet * currentMult).toFixed(2);
      document.getElementById('bet-info').textContent = currentBet + '$ → ' + pot + '$';

      // Auto cashout
      if (autoEnabled) {
        const target = parseFloat(document.getElementById('auto-cashout-input').value);
        if (target && currentMult >= target) {
          socket.emit('cashout', { token });
        }
      }
    }
  });

  socket.on('game_crash', (data) => {
    gamePhase = 'crashed';
    document.getElementById('multiplier').textContent = '💥 ' + data.crashAt + 'x';
    document.getElementById('multiplier').style.color = '#e94560';
    document.getElementById('multiplier').style.textShadow = '0 0 30px #e9456088';
    document.getElementById('status-text').textContent = '💥 Crash !';
    hasBet = false;
    updateBtn();
    if (data.crashHistory) updateCrashHistory(data.crashHistory);
  });

  socket.on('crash_history', d => updateCrashHistory(d.crashHistory));
  socket.on('lost', () => showMsg('💥 Perdu !', '#e94560'));

  socket.on('bet_placed', (data) => {
    balance = data.balance; currentBet = data.amount; hasBet = true;
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    document.getElementById('bet-info').textContent = '🎯 ' + currentBet + '$';
    showMsg('✅ Mise placée !', '#00ff88');
    updateBtn();
  });

  socket.on('cashout_success', (data) => {
    balance = data.balance; hasBet = false;
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    document.getElementById('bet-info').textContent = '';
    showMsg('✅ x' + data.multiplier + ' +' + data.profit + '$', '#00ff88');
    updateBtn();
  });

  socket.on('bet_error', d => showMsg('❌ ' + d.message, '#e94560'));
  socket.on('cashout_error', d => showMsg('❌ ' + d.message, '#e94560'));
  socket.on('bets_update', d => updateBetsList(d.activeBets));

  socket.on('lobby_update', (data) => {
    const n = data.connectedCount;
    document.getElementById('connected-count').textContent = '👥 ' + n;
    updateLeaderboard(data.leaderboard);
    updatePlayers(data.connectedUsers);
    updateBetsList(data.activeBets);
  });

  socket.on('emoji_received', d => spawnEmoji(d.emoji));
</script>
</body>
</html>
