<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🚀 Rocket Queen</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap');

    :root {
      --bg: #0e0e1f;
      --surface: #181830;
      --surface2: #1f1f3a;
      --border: #2e2e55;
      --green: #00f0a0;
      --green-dim: #00f0a033;
      --red: #ff3a5c;
      --red-dim: #ff3a5c33;
      --yellow: #ffd60a;
      --blue: #5599ff;
      --text: #ffffff;
      --muted: #aaaacc;
      --font-main: 'Rajdhani', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ══ AUTH ══ */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      gap: 12px;
      padding: 24px;
      background: radial-gradient(ellipse at center, #1a1a40 0%, #0e0e1f 70%);
    }
    .auth-logo {
      font-family: var(--font-main);
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--green);
      text-shadow: 0 0 40px var(--green-dim);
      margin-bottom: 8px;
    }
    .auth-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 12px; letter-spacing: 1px; }
    #auth-screen input {
      padding: 13px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: #fff;
      font-family: var(--font-main);
      font-size: 1rem;
      font-weight: 600;
      width: 100%;
      max-width: 320px;
      outline: none;
      transition: border-color 0.2s;
    }
    #auth-screen input:focus { border-color: var(--green); }
    .auth-btn {
      padding: 13px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: var(--font-main);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      width: 100%;
      max-width: 320px;
      transition: all 0.15s;
    }
    .auth-btn:active { transform: scale(0.97); }
    #btn-login { background: var(--green); color: #000; }
    #btn-register { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    #auth-error { color: var(--red); font-size: 0.85rem; text-align: center; min-height: 18px; }

    /* ══ GAME ══ */
    #game-screen { display: none; flex-direction: column; height: 100dvh; }

    /* TOP BAR */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 8px;
    }
    .logo {
      font-family: var(--font-main);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--green);
      white-space: nowrap;
    }
    .top-stats { display: flex; align-items: center; gap: 14px; flex: 1; justify-content: flex-end; }
    #connected-count { color: var(--muted); font-size: 0.75rem; }
    #balance { color: var(--green); font-weight: 700; font-family: var(--font-mono); font-size: 0.88rem; }
    #username-display { color: var(--muted); font-size: 0.75rem; }

    /* HISTORY */
    .history-bar {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 14px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .history-bar::-webkit-scrollbar { display: none; }
    .history-label { color: var(--muted); font-size: 0.68rem; flex-shrink: 0; text-transform: uppercase; letter-spacing: 1px; }
    .crash-badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      font-family: var(--font-mono);
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .crash-low { background: #3a1020; color: var(--red); }
    .crash-mid { background: #0f3525; color: var(--green); }
    .crash-high { background: #0f1f45; color: var(--blue); }

    /* ══ MAIN LAYOUT ══ */
    .main-layout { display: flex; flex: 1; overflow: hidden; }
    .left-col { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    /* FLIGHT BOX */
    .flight-box {
      position: relative;
      flex: 1;
      background: var(--bg);
      overflow: hidden;
    }
    #flight-canvas { width: 100%; height: 100%; display: block; }

    #multiplier {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-mono);
      font-size: clamp(2.2rem, 8vw, 4.5rem);
      font-weight: 700;
      color: var(--green);
      text-shadow: 0 0 40px var(--green-dim);
      pointer-events: none;
      white-space: nowrap;
      transition: color 0.1s, text-shadow 0.1s;
    }
    #status-text {
      position: absolute;
      top: 10px;
      left: 12px;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #countdown {
      position: absolute;
      top: 10px;
      right: 12px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--yellow);
      font-weight: 700;
    }

    /* Emoji bubbles */
    .emoji-bubble {
      position: absolute;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 8px;
      font-size: 0.75rem;
      font-family: var(--font-main);
      font-weight: 600;
      color: #fff;
      animation: bubbleUp 3s ease-out forwards;
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
    }
    @keyframes bubbleUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      80%  { opacity: 0.9; }
      100% { opacity: 0; transform: translateY(-100px) scale(0.8); }
    }

    /* Cashout notification */
    .cashout-notif {
      position: absolute;
      right: 12px;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 0.78rem;
      font-family: var(--font-main);
      font-weight: 700;
      background: #0a2a18;
      border: 1px solid var(--green);
      color: var(--green);
      animation: slideIn 2.5s ease-out forwards;
      pointer-events: none;
      z-index: 20;
    }
    @keyframes slideIn {
      0%   { opacity: 0; transform: translateX(30px); }
      15%  { opacity: 1; transform: translateX(0); }
      80%  { opacity: 1; }
      100% { opacity: 0; transform: translateX(30px); }
    }

    /* ══ CONTROLS PANEL ══ */
    .controls-panel {
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Bet inputs collapse smoothly during flight — no height jump */
    .bet-inputs-wrap {
      overflow: hidden;
      max-height: 120px;
      transition: max-height 0.25s ease, opacity 0.2s ease;
      opacity: 1;
    }
    .bet-inputs-wrap.hidden {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }
    .bet-tabs-wrap {
      overflow: hidden;
      max-height: 40px;
      transition: max-height 0.25s ease, opacity 0.2s ease;
      opacity: 1;
    }
    .bet-tabs-wrap.hidden {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }
    .auto-row-wrap {
      overflow: hidden;
      max-height: 40px;
      transition: max-height 0.2s ease, opacity 0.2s ease;
      opacity: 1;
    }
    .auto-row-wrap.hidden {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* Double bet tabs */
    .bet-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 2px;
    }
    .bet-tab {
      flex: 1;
      padding: 6px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-family: var(--font-main);
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }
    .bet-tab.active { border-color: var(--green); color: var(--green); background: #0a2a18; }
    .bet-tab.active2 { border-color: var(--blue); color: var(--blue); background: #0a1535; }

    /* Bet panels */
    .bet-panel { display: none; }
    .bet-panel.visible { display: block; }

    .bet-area { display: flex; gap: 8px; align-items: stretch; }
    .bet-input-wrap { flex: 1; display: flex; flex-direction: column; gap: 5px; }

    .amount-display {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      transition: border-color 0.2s;
    }
    .amount-display:focus-within { border-color: var(--green); }
    .amount-display.bet2:focus-within { border-color: var(--blue); }
    .amount-display input {
      background: none;
      border: none;
      color: #fff;
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      width: 100%;
      outline: none;
    }
    .amount-display input::placeholder { color: #333; }
    .currency { color: var(--yellow); font-weight: 700; font-size: 0.9rem; font-family: var(--font-mono); }

    .quick-row { display: flex; gap: 4px; }
    .q-btn {
      flex: 1;
      padding: 5px 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-family: var(--font-main);
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s;
    }
    .q-btn:active { background: #1a1a4a; color: #fff; transform: scale(0.95); }
    .half-double { display: flex; gap: 4px; }
    .hd-btn {
      flex: 1;
      padding: 5px 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      font-family: var(--font-main);
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s;
    }
    .hd-btn:active { background: #1a1a4a; color: #fff; transform: scale(0.95); }

    /* Auto options row */
    .auto-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .auto-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 5px 10px;
      flex: 1;
      min-width: 130px;
    }
    .auto-label { font-size: 0.72rem; color: var(--muted); white-space: nowrap; font-weight: 600; }
    .auto-pill input {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 700;
      outline: none;
      min-width: 40px;
      width: 50px;
    }
    .auto-pill input::placeholder { color: #333; }
    .auto-toggle {
      width: 36px;
      height: 19px;
      background: #333;
      border-radius: 20px;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
      border: none;
    }
    .auto-toggle.on { background: var(--green); }
    .auto-toggle::after {
      content: '';
      position: absolute;
      width: 15px;
      height: 15px;
      background: #fff;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }
    .auto-toggle.on::after { left: 19px; }

    /* Auto-bet pill */
    .autobet-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 5px 10px;
    }

    /* MAIN BUTTON */
    .main-btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 100%;
    }
    #main-btn, #main-btn2 {
      width: 100%;
      padding: 15px 14px;
      border-radius: 12px;
      border: none;
      font-family: var(--font-main);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
    }
    #main-btn:active, #main-btn2:active { transform: scale(0.97); }
    #live-gain {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--green);
      text-align: center;
      min-height: 1.4rem;
      letter-spacing: 0.5px;
    }
    #live-gain2 {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 700;
      color: var(--blue);
      text-align: center;
      min-height: 1.2rem;
    }

    /* Status row */
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #bet-info { font-size: 0.78rem; color: var(--yellow); font-family: var(--font-mono); }
    #message { font-size: 0.78rem; font-family: var(--font-main); font-weight: 600; }

    /* EMOJI */
    .emoji-row { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; padding-bottom: 1px; }
    .emoji-row::-webkit-scrollbar { display: none; }
    .emoji-btn {
      font-size: 1.35rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 5px 10px;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.1s;
    }
    .emoji-btn:active { transform: scale(1.2); }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: 230px;
      background: var(--bg);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .tab-btn {
      flex: 1;
      padding: 9px 2px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font-main);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      text-transform: uppercase;
    }
    .tab-btn.active { color: #fff; border-bottom-color: var(--green); }
    .tab-content { display: none; flex-direction: column; overflow-y: auto; flex: 1; padding: 6px; gap: 4px; }
    .tab-content.active { display: flex; }
    .empty-msg { color: #2a2a5a; font-size: 0.78rem; padding: 6px; }

    .bet-item {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      border-radius: 7px;
      background: var(--surface2);
      font-size: 0.77rem;
      gap: 4px;
    }
    .bet-item.cashed { background: #0f3020; }
    .bet-user { font-weight: 700; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bet-amount { color: var(--yellow); flex-shrink: 0; font-family: var(--font-mono); font-size: 0.72rem; }
    .bet-status { flex-shrink: 0; font-size: 0.72rem; }
    .bet-status2 { flex-shrink: 0; font-size: 0.68rem; color: var(--blue); }

    .lb-item {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      border-radius: 7px;
      background: var(--surface2);
      font-size: 0.77rem;
      gap: 5px;
    }
    .lb-rank { width: 20px; text-align: center; color: var(--muted); font-size: 0.72rem; flex-shrink: 0; }
    .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
    .lb-name.me { color: var(--green); }
    .lb-balance { color: var(--green); font-weight: 700; flex-shrink: 0; font-family: var(--font-mono); font-size: 0.72rem; }

    .player-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 8px;
      border-radius: 7px;
      background: var(--surface2);
      font-size: 0.77rem;
    }
    .player-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 6px var(--green); }
    .player-name.me { color: var(--green); font-weight: 700; }

    /* STATS TAB */
    .stats-section { padding: 8px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1; }
    .stat-card {
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
    }
    .stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
    .stat-value { font-family: var(--font-mono); font-size: 1rem; font-weight: 700; color: var(--green); }
    .stat-value.red { color: var(--red); }
    .stat-value.yellow { color: var(--yellow); }

    #mini-chart { width: 100%; height: 60px; }

    .history-list { display: flex; flex-direction: column; gap: 3px; overflow-y: auto; max-height: 200px; }
    .history-entry {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 6px;
      border-radius: 6px;
      background: var(--surface);
      font-size: 0.7rem;
      font-family: var(--font-mono);
    }
    .history-entry.win { border-left: 2px solid var(--green); }
    .history-entry.loss { border-left: 2px solid var(--red); }
    .he-crash { color: var(--muted); flex-shrink: 0; }
    .he-profit { font-weight: 700; flex-shrink: 0; margin-left: auto; }
    .he-profit.pos { color: var(--green); }
    .he-profit.neg { color: var(--red); }

    /* ══ MOBILE ══ */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .mobile-tabs-wrap { display: flex; flex-direction: column; flex-shrink: 0; }
      .mobile-tabs {
        display: flex;
        border-top: 1px solid var(--border);
        background: var(--bg);
      }
      .mobile-tab-btn {
        flex: 1;
        padding: 6px 2px;
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-family: var(--font-main);
        font-size: 0.62rem;
        font-weight: 600;
        border-top: 2px solid transparent;
        transition: all 0.15s;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .mobile-tab-btn.active { color: #fff; border-top-color: var(--green); }
      .mobile-tab-content {
        display: none;
        background: var(--bg);
        max-height: 90px;
        overflow-y: auto;
        padding: 4px 8px;
        gap: 3px;
        flex-direction: column;
        border-top: 1px solid var(--border);
      }
      .mobile-tab-content.active { display: flex; }

      /* Tighter controls on mobile */
      .controls-panel { padding: 7px 10px; gap: 5px; }
      .emoji-btn { font-size: 1.3rem; padding: 4px 8px; }
      #main-btn, #main-btn2 { font-size: 1.1rem; padding: 12px; }
      #live-gain { font-size: 0.95rem; }
      .amount-display input { font-size: 1rem; }
      .q-btn, .hd-btn { padding: 4px 0; font-size: 0.68rem; }
      .auto-pill { padding: 4px 8px; }
      .auto-label { font-size: 0.68rem; }
      .bet-tab { padding: 5px; font-size: 0.75rem; }
      .history-bar { padding: 3px 10px; }
      .top-bar { padding: 5px 10px; }
    }
    @media (min-width: 641px) {
      .mobile-tabs-wrap { display: none; }
    }

    @keyframes btnBlink {
      0%, 100% { box-shadow: 0 0 0px var(--green); opacity: 1; }
      50%       { box-shadow: 0 0 18px var(--green); opacity: 0.75; }
    }
    .btn-blink { animation: btnBlink 0.9s ease-in-out infinite; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="auth-screen">
  <div class="auth-logo">🚀 ROCKET QUEEN</div>
  <div class="auth-sub">CRASH GAME</div>
  <input type="text" id="input-username" placeholder="Pseudo" autocomplete="off" />
  <input type="password" id="input-password" placeholder="Mot de passe" />
  <button class="auth-btn" id="btn-login" onclick="doLogin()">CONNEXION</button>
  <button class="auth-btn" id="btn-register" onclick="doRegister()">CRÉER UN COMPTE</button>
  <span id="auth-error"></span>
</div>

<!-- ══ GAME ══ -->
<div id="game-screen">

  <div class="top-bar">
    <div class="logo">🚀 ROCKET QUEEN</div>
    <div class="top-stats">
      <span id="connected-count">👥 0</span>
      <span id="balance">💰 1000 $</span>
      <span id="username-display"></span>
    </div>
  </div>

  <div class="history-bar">
    <span class="history-label">Crashs :</span>
    <div id="crash-history" style="display:flex;gap:5px;"></div>
  </div>

  <div class="main-layout">

    <!-- LEFT -->

<script src="/socket.io/socket.io.js"></script>
<script>
  // ── STATE ──
  let token = null, username = null, balance = 0, sessionStart = 0;
  let gamePhase = 'waiting';
  let hasBet = false, hasBet2 = false;
  let currentBet = 0, currentBet2 = 0;
  let currentMult = 1.0;
  let autoEnabled = false, autoBetEnabled = false;
  let lastBetAmount = 0, lastBetAmount2 = 0;
  let activeBetPanel = 1;
  let personalHistory = [];
  let bestCashout = 0;
  let streak = 0;

  const socket = io();

  // ── AUDIO ──
  let soundEnabled = true;
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  // ── CHILL MUSIC ──
  let musicPlaying = false;
  let musicNodes = [];  // all nodes to disconnect on stop
  let musicScheduler = null;

  // Lo-fi chord progression: Fmaj7 → Dm7 → Am7 → C7  (loop)
  // Notes in Hz (equal temperament, A4=440)
  const NOTE = n => 440 * Math.pow(2, n / 12);
  const chords = [
    // Fmaj7: F3 A3 C4 E4
    [NOTE(-17), NOTE(-13), NOTE(-10), NOTE(-6)],
    // Dm7: D3 F3 A3 C4
    [NOTE(-19), NOTE(-17), NOTE(-13), NOTE(-10)],
    // Am7: A2 C3 E3 G3
    [NOTE(-24), NOTE(-22), NOTE(-18), NOTE(-15)],
    // C7:  C3 E3 G3 Bb3
    [NOTE(-22), NOTE(-18), NOTE(-15), NOTE(-13)],
  ];
  const bassNotes = [NOTE(-29), NOTE(-31), NOTE(-36), NOTE(-34)]; // F2 D2 A1 C2
  const CHORD_DUR = 2.0; // seconds per chord

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
  }

  function makePad(ctx, freq, startTime, duration, vol) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();

    osc.type = 'triangle';
    osc.frequency.value = freq;
    // Slight detune for warmth
    osc.detune.value = (Math.random() - 0.5) * 8;

    filter.type = 'lowpass';
    filter.frequency.value = 1200;
    filter.Q.value = 0.8;

    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(vol, startTime + 0.3);
    gain.gain.setValueAtTime(vol, startTime + duration - 0.4);
    gain.gain.linearRampToValueAtTime(0, startTime + duration);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.1);
    musicNodes.push(osc, gain, filter);
  }

  function makeBass(ctx, freq, startTime, duration) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();

    osc.type = 'sine';
    osc.frequency.value = freq;

    filter.type = 'lowpass';
    filter.frequency.value = 300;

    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.12, startTime + 0.05);
    gain.gain.setValueAtTime(0.12, startTime + duration - 0.3);
    gain.gain.linearRampToValueAtTime(0, startTime + duration);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.1);
    musicNodes.push(osc, gain, filter);
  }

  function makeHihat(ctx, startTime, vol) {
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 3);
    }
    const src = ctx.createBufferSource();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    src.buffer = buf;
    filter.type = 'highpass';
    filter.frequency.value = 6000;
    gain.gain.value = vol;
    src.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    src.start(startTime);
    musicNodes.push(src, gain, filter);
  }

  function makeKick(ctx, startTime) {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(120, startTime);
    osc.frequency.exponentialRampToValueAtTime(40, startTime + 0.15);
    gain.gain.setValueAtTime(0.3, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.25);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(startTime);
    osc.stop(startTime + 0.3);
    musicNodes.push(osc, gain);
  }

  function scheduleMusic() {
    if (!musicPlaying) return;
    const ctx = getAudioCtx();
    const loopDur = chords.length * CHORD_DUR; // 8s loop
    let t = ctx.currentTime + 0.05;

    // Chords + bass
    chords.forEach((chord, ci) => {
      const cs = t + ci * CHORD_DUR;
      chord.forEach(freq => makePad(ctx, freq, cs, CHORD_DUR + 0.1, 0.045));
      makeBass(ctx, bassNotes[ci], cs, CHORD_DUR);
    });

    // Drums: kick on 1 & 3, hihat every 8th note
    const beat = CHORD_DUR / 2; // half chord = 1 beat
    const totalBeats = chords.length * 2;
    for (let b = 0; b < totalBeats; b++) {
      const bt = t + b * beat;
      if (b % 2 === 0) makeKick(ctx, bt);                        // kick on 1,3,5,7
      makeHihat(ctx, bt, 0.04);                                   // hihat every beat
      makeHihat(ctx, bt + beat * 0.5, 0.025);                    // offbeat hihat
    }

    // Re-schedule slightly before loop ends
    musicScheduler = setTimeout(scheduleMusic, (loopDur - 0.3) * 1000);
  }

  function startMusic() {
    if (musicPlaying || !soundEnabled) return;
    musicPlaying = true;
    scheduleMusic();
  }

  function stopMusic() {
    musicPlaying = false;
    if (musicScheduler) { clearTimeout(musicScheduler); musicScheduler = null; }
    // Nodes auto-stop at their scheduled time; just clear refs
    musicNodes = [];
  }

  function toggleSound() {
    soundEnabled = !soundEnabled;
    const btn = document.getElementById('sound-btn');
    btn.textContent = soundEnabled ? '🔊' : '🔇';
    btn.style.opacity = soundEnabled ? '1' : '0.5';
    if (!soundEnabled) {
      stopEngine();
      stopMusic();
    } else {
      startMusic();
    }
  }

  let engineOsc = null, engineGain = null, engineOsc2 = null;

  function getChordRoot(time) {
    // Same chord progression as music: Fmaj7 Dm7 Am7 C7, each CHORD_DUR seconds
    const loopDur = chords.length * CHORD_DUR;
    const t = time % loopDur;
    const ci = Math.floor(t / CHORD_DUR);
    return bassNotes[ci]; // F2 D2 A1 C2
  }

  function startEngine(mult) {
    if (!soundEnabled) return;
    try {
      const ctx = getAudioCtx();
      if (engineOsc) { try { engineOsc.stop(); } catch(e){} engineOsc = null; }
      if (engineOsc2) { try { engineOsc2.stop(); } catch(e){} engineOsc2 = null; }

      const root = getChordRoot(ctx.currentTime);

      // Sub-bass drone on chord root
      engineOsc = ctx.createOscillator();
      engineGain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 400;
      engineOsc.type = 'sawtooth';
      engineOsc.frequency.value = root;
      engineGain.gain.value = 0.06;
      engineOsc.connect(filter);
      filter.connect(engineGain);
      engineGain.connect(ctx.destination);
      engineOsc.start();

      // Octave above for body
      engineOsc2 = ctx.createOscillator();
      const gain2 = ctx.createGain();
      engineOsc2.type = 'triangle';
      engineOsc2.frequency.value = root * 2;
      gain2.gain.value = 0.03;
      engineOsc2.connect(gain2);
      gain2.connect(ctx.destination);
      engineOsc2.start();

      musicNodes.push(filter);
    } catch(e) {}
  }

  function updateEngine(mult) {
    if (!engineOsc || !engineOsc2) return;
    try {
      const ctx = getAudioCtx();
      const root = getChordRoot(ctx.currentTime);
      // Glide to new root over 0.1s
      engineOsc.frequency.setTargetAtTime(root, ctx.currentTime, 0.1);
      engineOsc2.frequency.setTargetAtTime(root * 2, ctx.currentTime, 0.1);
      // Slight pitch rise with multiplier (subtle growl)
      const detune = Math.min((mult - 1) * 8, 60);
      engineOsc.detune.setTargetAtTime(detune, ctx.currentTime, 0.3);
      engineOsc2.detune.setTargetAtTime(detune, ctx.currentTime, 0.3);
    } catch(e) {}
  }

  function stopEngine() {
    if (engineOsc) {
      try {
        engineGain.gain.linearRampToValueAtTime(0, getAudioCtx().currentTime + 0.4);
        const o = engineOsc, o2 = engineOsc2;
        setTimeout(() => {
          try { o.stop(); } catch(e){}
          try { if (o2) o2.stop(); } catch(e){}
        }, 500);
        engineOsc = null; engineOsc2 = null;
      } catch(e) {}
    }
  }

  function playCrashSound() {
    if (!soundEnabled) return;
    try {
      stopEngine();
      const ctx = getAudioCtx();
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2) * 0.4;
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const g = ctx.createGain(); g.gain.value = 1;
      src.connect(g); g.connect(ctx.destination);
      src.start();
    } catch(e) {}
  }

  function playCashoutSound() {
    if (!soundEnabled) return;
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
      g.gain.setValueAtTime(0.2, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.3);
    } catch(e) {}
  }

  function playBetSound() {
    if (!soundEnabled) return;
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 440;
      g.gain.setValueAtTime(0.1, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
  }

  // ── CANVAS ──
  const canvas = document.getElementById('flight-canvas');
  const ctx2d = canvas.getContext('2d');

  // ── SPACE BACKGROUND ──
  let stars = [];
  let planets = [];
  let nebulaClouds = [];
  let asteroids = [];

  function initSpaceBackground() {
    const w = cW(), h = cH();

    // Stars — 3 layers of depth
    stars = [];
    for (let i = 0; i < 160; i++) {
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.4 + 0.2,
        speed: Math.random() * 0.3 + 0.05,
        alpha: Math.random() * 0.6 + 0.2,
        twinkle: Math.random() * Math.PI * 2,
        twinkleSpeed: Math.random() * 0.04 + 0.01
      });
    }

    // Planets — 2 to 4, placed in corners/edges
    planets = [];
    const planetDefs = [
      { x: w * 0.12, y: h * 0.18, r: Math.min(w,h)*0.07, color: '#c45a2a', ringColor: '#e07a4a', hasRing: true },
      { x: w * 0.82, y: h * 0.28, r: Math.min(w,h)*0.045, color: '#3a6eaa', ringColor: null, hasRing: false },
      { x: w * 0.75, y: h * 0.75, r: Math.min(w,h)*0.035, color: '#7a4a9a', ringColor: null, hasRing: false },
    ];
    planets = planetDefs;

    // Nebula clouds — soft blobs in background
    nebulaClouds = [];
    for (let i = 0; i < 4; i++) {
      nebulaClouds.push({
        x: Math.random() * w,
        y: Math.random() * h,
        rx: w * (0.15 + Math.random() * 0.2),
        ry: h * (0.1 + Math.random() * 0.15),
        hue: [200, 270, 180, 310][i],
        alpha: 0.04 + Math.random() * 0.04
      });
    }

    // Asteroids — small tumbling rocks
    asteroids = [];
    for (let i = 0; i < 6; i++) {
      asteroids.push({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 4 + 2,
        speed: Math.random() * 0.15 + 0.05,
        angle: Math.random() * Math.PI * 2,
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.03,
        alpha: Math.random() * 0.4 + 0.2
      });
    }
  }

  function drawSpaceBackground(animate) {
    const w = cW(), h = cH();

    // Nebula clouds first (deepest layer)
    nebulaClouds.forEach(n => {
      const grad = ctx2d.createRadialGradient(n.x, n.y, 0, n.x, n.y, Math.max(n.rx, n.ry));
      grad.addColorStop(0, `hsla(${n.hue}, 70%, 40%, ${n.alpha})`);
      grad.addColorStop(1, 'transparent');
      ctx2d.save();
      ctx2d.scale(1, n.ry / n.rx);
      ctx2d.beginPath();
      ctx2d.arc(n.x, n.y * (n.rx / n.ry), n.rx, 0, Math.PI * 2);
      ctx2d.fillStyle = grad;
      ctx2d.fill();
      ctx2d.restore();
    });

    // Planets
    planets.forEach(p => {
      // Shadow/atmosphere glow
      const atmo = ctx2d.createRadialGradient(p.x, p.y, p.r * 0.6, p.x, p.y, p.r * 1.4);
      atmo.addColorStop(0, 'transparent');
      atmo.addColorStop(1, p.color + '33');
      ctx2d.beginPath();
      ctx2d.arc(p.x, p.y, p.r * 1.4, 0, Math.PI * 2);
      ctx2d.fillStyle = atmo;
      ctx2d.fill();

      // Planet body
      const bodyGrad = ctx2d.createRadialGradient(p.x - p.r*0.3, p.y - p.r*0.3, p.r*0.1, p.x, p.y, p.r);
      bodyGrad.addColorStop(0, lightenColor(p.color, 40));
      bodyGrad.addColorStop(0.6, p.color);
      bodyGrad.addColorStop(1, darkenColor(p.color, 40));
      ctx2d.beginPath();
      ctx2d.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx2d.fillStyle = bodyGrad;
      ctx2d.fill();

      // Surface stripes
      ctx2d.save();
      ctx2d.clip();
      ctx2d.globalAlpha = 0.15;
      for (let s = -1; s <= 1; s++) {
        ctx2d.beginPath();
        ctx2d.ellipse(p.x, p.y + s * p.r * 0.35, p.r, p.r * 0.12, 0, 0, Math.PI * 2);
        ctx2d.fillStyle = '#ffffff';
        ctx2d.fill();
      }
      ctx2d.globalAlpha = 1;
      ctx2d.restore();

      // Ring (Saturn-style)
      if (p.hasRing) {
        ctx2d.save();
        ctx2d.globalAlpha = 0.5;
        ctx2d.strokeStyle = p.ringColor;
        ctx2d.lineWidth = p.r * 0.18;
        ctx2d.beginPath();
        ctx2d.ellipse(p.x, p.y, p.r * 1.7, p.r * 0.35, 0, 0, Math.PI * 2);
        ctx2d.stroke();
        ctx2d.globalAlpha = 1;
        ctx2d.restore();
      }
    });

    // Stars with twinkle
    stars.forEach(s => {
      if (animate && gamePhase === 'flying') {
        s.x -= s.speed * currentMult * 0.25;
        if (s.x < 0) s.x = w;
      }
      s.twinkle += s.twinkleSpeed;
      const alpha = s.alpha * (0.7 + 0.3 * Math.sin(s.twinkle));
      ctx2d.beginPath();
      ctx2d.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx2d.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx2d.fill();
    });

    // Asteroids
    asteroids.forEach(a => {
      if (animate && gamePhase === 'flying') {
        a.x -= a.speed * currentMult * 0.4;
        if (a.x < -10) a.x = w + 10;
        a.rot += a.rotSpeed;
      }
      ctx2d.save();
      ctx2d.translate(a.x, a.y);
      ctx2d.rotate(a.rot);
      ctx2d.globalAlpha = a.alpha;
      ctx2d.fillStyle = '#8a7a6a';
      ctx2d.beginPath();
      // Irregular polygon for asteroid shape
      const sides = 7;
      for (let i = 0; i < sides; i++) {
        const ang = (i / sides) * Math.PI * 2;
        const jitter = a.r * (0.7 + (((i * 137) % 7) / 7) * 0.6);
        const px2 = Math.cos(ang) * jitter;
        const py2 = Math.sin(ang) * jitter;
        i === 0 ? ctx2d.moveTo(px2, py2) : ctx2d.lineTo(px2, py2);
      }
      ctx2d.closePath();
      ctx2d.fill();
      ctx2d.globalAlpha = 1;
      ctx2d.restore();
    });
  }

  function lightenColor(hex, amt) {
    let n = parseInt(hex.slice(1), 16);
    let r = Math.min(255, (n >> 16) + amt);
    let g = Math.min(255, ((n >> 8) & 0xff) + amt);
    let b = Math.min(255, (n & 0xff) + amt);
    return `rgb(${r},${g},${b})`;
  }
  function darkenColor(hex, amt) {
    let n = parseInt(hex.slice(1), 16);
    let r = Math.max(0, (n >> 16) - amt);
    let g = Math.max(0, ((n >> 8) & 0xff) - amt);
    let b = Math.max(0, (n & 0xff) - amt);
    return `rgb(${r},${g},${b})`;
  }

  // Particles trail
  let particles = [];

  function addParticles(px, py, mult) {
    const count = 3;
    for (let i = 0; i < count; i++) {
      particles.push({
        x: px,
        y: py,
        vx: (Math.random() - 0.5) * 2 - mult * 0.3,
        vy: (Math.random() - 1) * 1.5,
        life: 1,
        decay: Math.random() * 0.05 + 0.03,
        r: Math.random() * 3 + 1,
        hue: 140 + Math.random() * 40
      });
    }
  }

  function updateParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.life -= p.decay;
    });
  }

  function drawParticles() {
    particles.forEach(p => {
      const radius = p.r * p.life;
      if (radius <= 0) return;
      ctx2d.beginPath();
      ctx2d.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx2d.fillStyle = `hsla(${p.hue}, 100%, 60%, ${p.life * 0.8})`;
      ctx2d.fill();
    });
  }

  // CSS dimensions (independent of DPI) — use these for all draw coordinate logic
  function cW() { return canvas.offsetWidth; }
  function cH() { return canvas.offsetHeight; }

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const cssW = canvas.offsetWidth;
    const cssH = canvas.offsetHeight;
    // Set actual pixel buffer at full DPI
    canvas.width  = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    // Scale all draw calls so coordinates stay in CSS pixels
    ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
    initSpaceBackground();
  }
  resizeCanvas();
  // Only resize on orientation change, not scroll/keyboard on mobile
  window.addEventListener('resize', () => {
    // Debounce to avoid jitter from mobile keyboard
    clearTimeout(window._resizeTimer);
    window._resizeTimer = setTimeout(() => { resizeCanvas(); resetCanvas(); }, 200);
  });

  // Crash explosion
  let explosionParticles = [];
  let explosionTime = 0;

  function triggerExplosion(px, py) {
    explosionParticles = [];
    for (let i = 0; i < 80; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 6 + 2;
      explosionParticles.push({
        x: px, y: py,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: Math.random() * 0.03 + 0.015,
        r: Math.random() * 5 + 2,
        hue: Math.random() * 60 + 0  // red-orange
      });
    }
    explosionTime = 60;
  }

  function drawExplosion() {
    if (explosionTime <= 0) return;
    explosionTime--;
    explosionParticles = explosionParticles.filter(p => p.life > 0);
    explosionParticles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.15;
      p.vx *= 0.97;
      p.life -= p.decay;
      const radius = p.r * p.life;
      if (radius <= 0) return;
      ctx2d.beginPath();
      ctx2d.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx2d.fillStyle = `hsla(${p.hue}, 100%, 60%, ${p.life})`;
      ctx2d.fill();
    });
  }

  // Flight path points for curved trajectory
  let flightPoints = [];

  function getCurvePos(progress) {
    const w = cW(), h = cH();
    const margin = 30;
    // Exponential curve: starts shallow, gets steep
    const t = Math.pow(progress, 0.7);
    const px = margin + t * (w - margin * 2);
    const py = (h - margin) - Math.pow(progress, 0.5) * (h - margin * 2);
    return { px, py };
  }


  function drawGrid() {
    const w = cW(), h = cH();
    ctx2d.strokeStyle = '#191932';
    ctx2d.lineWidth = 1;
    for (let x = 0; x < w; x += 45) {
      ctx2d.beginPath(); ctx2d.moveTo(x, 0); ctx2d.lineTo(x, h); ctx2d.stroke();
    }
    for (let y = 0; y < h; y += 38) {
      ctx2d.beginPath(); ctx2d.moveTo(0, y); ctx2d.lineTo(w, y); ctx2d.stroke();
    }
  }

  function drawFlight(mult) {
    const w = cW(), h = cH();
    ctx2d.clearRect(0, 0, w, h);
    drawGrid();
    drawSpaceBackground(true);

    const progress = Math.min(Math.log(Math.max(mult, 1)) / Math.log(14), 1);
    const { px, py } = getCurvePos(progress);

    // Record trail point
    flightPoints.push({ x: px, y: py });
    if (flightPoints.length > 300) flightPoints.shift();

    // Draw trail
    if (flightPoints.length > 1) {
      // Glow underneath
      ctx2d.beginPath();
      ctx2d.moveTo(flightPoints[0].x, flightPoints[0].y);
      for (let i = 1; i < flightPoints.length; i++) {
        ctx2d.lineTo(flightPoints[i].x, flightPoints[i].y);
      }
      ctx2d.lineTo(px, h - 30);
      ctx2d.lineTo(flightPoints[0].x, h - 30);
      ctx2d.closePath();
      const fill = ctx2d.createLinearGradient(0, py, 0, h - 30);
      fill.addColorStop(0, 'rgba(0,240,160,0.08)');
      fill.addColorStop(1, 'rgba(0,240,160,0)');
      ctx2d.fillStyle = fill;
      ctx2d.fill();

      // Glow line
      ctx2d.beginPath();
      ctx2d.moveTo(flightPoints[0].x, flightPoints[0].y);
      for (let i = 1; i < flightPoints.length; i++) {
        ctx2d.lineTo(flightPoints[i].x, flightPoints[i].y);
      }
      ctx2d.strokeStyle = 'rgba(0,240,160,0.15)';
      ctx2d.lineWidth = 12;
      ctx2d.lineCap = 'round';
      ctx2d.stroke();

      // Main line
      ctx2d.beginPath();
      ctx2d.moveTo(flightPoints[0].x, flightPoints[0].y);
      for (let i = 1; i < flightPoints.length; i++) {
        ctx2d.lineTo(flightPoints[i].x, flightPoints[i].y);
      }
      const lineGrad = ctx2d.createLinearGradient(flightPoints[0].x, flightPoints[0].y, px, py);
      lineGrad.addColorStop(0, '#00aa66');
      lineGrad.addColorStop(1, '#00f0a0');
      ctx2d.strokeStyle = lineGrad;
      ctx2d.lineWidth = 2.5;
      ctx2d.stroke();
    }

    // Particles trail (drawn BEFORE multiplier and plane)
    if (gamePhase === 'flying') {
      addParticles(px, py, mult);
    }
    updateParticles();
    drawParticles();

    // Explosion (drawn BEFORE multiplier and plane)
    drawExplosion();

    // Multiplier text on canvas — below plane
    drawMultiplierOnCanvas();

    // Plane LAST — always on top
    drawPlane(px, py, progress);
  }

  function drawMultiplierOnCanvas() {
    const w = cW(), h = cH();
    const multEl = document.getElementById('multiplier');
    const text = multEl.textContent;
    const colorAttr = multEl.style.color || '';

    let fillColor = '#00f0a0'; // default green
    if (colorAttr.includes('red') || colorAttr === '#ff3a5c') fillColor = '#ff3a5c';
    else if (colorAttr.includes('green') || colorAttr === '#00f0a0') fillColor = '#00f0a0';

    const fontSize = Math.max(28, Math.min(60, w * 0.09));
    ctx2d.save();
    ctx2d.font = `700 ${fontSize}px 'Space Mono', monospace`;
    ctx2d.textAlign = 'center';
    ctx2d.textBaseline = 'middle';
    // Soft glow
    ctx2d.globalAlpha = 0.15;
    ctx2d.fillStyle = fillColor;
    for (let d = 8; d >= 2; d -= 2) {
      ctx2d.fillText(text, w / 2 + d, h / 2);
      ctx2d.fillText(text, w / 2 - d, h / 2);
      ctx2d.fillText(text, w / 2, h / 2 + d);
      ctx2d.fillText(text, w / 2, h / 2 - d);
    }
    ctx2d.globalAlpha = 1;
    ctx2d.fillStyle = fillColor;
    ctx2d.fillText(text, w / 2, h / 2);
    ctx2d.textAlign = 'left';
    ctx2d.textBaseline = 'alphabetic';
    ctx2d.restore();
  }

  function drawPlane(px, py, progress) {
    ctx2d.save();
    ctx2d.translate(px, py);

    // Angle based on curve tangent — smooth over last few points
    let angle = 0;
    if (flightPoints.length >= 2) {
      const last = flightPoints[flightPoints.length - 1];
      const prev = flightPoints[Math.max(0, flightPoints.length - 6)];
      angle = Math.atan2(last.y - prev.y, last.x - prev.x);
    }
    ctx2d.rotate(angle);

    // Stable glow: fixed radial gradient, no randomness, no shadowBlur
    const size = Math.max(20, Math.min(28, cW() / 22));
    const glowR = ctx2d.createRadialGradient(0, 0, 0, 0, 0, size * 1.2);
    glowR.addColorStop(0, 'rgba(0,240,160,0.25)');
    glowR.addColorStop(1, 'rgba(0,240,160,0)');
    ctx2d.fillStyle = glowR;
    ctx2d.beginPath();
    ctx2d.arc(0, 0, size * 1.2, 0, Math.PI * 2);
    ctx2d.fill();

    // Draw plane emoji — no shadow to prevent flicker
    ctx2d.shadowBlur = 0;
    ctx2d.font = `${size}px serif`;
    ctx2d.fillText('🚀', -size / 2, size / 3);

    ctx2d.restore();
  }

  function resetCanvas() {
    const w = cW(), h = cH();
    flightPoints = [];
    particles = [];
    ctx2d.clearRect(0, 0, w, h);
    drawGrid();
    drawSpaceBackground(false);
    drawMultiplierOnCanvas();
    ctx2d.shadowBlur = 0;
    ctx2d.font = '24px serif';
    ctx2d.fillText('🚀', 20, h - 20);
  }

  // Betting phase canvas countdown
  let bettingAnimFrame = null;
  let bettingEndTime = 0;

  function startBettingCountdownCanvas(durationMs) {
    bettingEndTime = performance.now() + durationMs;
    if (bettingAnimFrame) cancelAnimationFrame(bettingAnimFrame);

    function loop() {
      if (gamePhase !== 'betting') return;
      const remaining = Math.max(0, bettingEndTime - performance.now());
      const w = cW(), h = cH();
      ctx2d.clearRect(0, 0, w, h);
      drawGrid();
      drawSpaceBackground(false);

      // Circular progress ring
      const sec = remaining / 1000;
      const total = durationMs / 1000;
      const progress = remaining / durationMs; // 1→0
      const cx = w / 2, cy = h / 2;
      const r = Math.min(w, h) * 0.18;

      // Background ring
      ctx2d.beginPath();
      ctx2d.arc(cx, cy, r, 0, Math.PI * 2);
      ctx2d.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx2d.lineWidth = 6;
      ctx2d.stroke();

      // Progress arc (green → yellow → red as time runs out)
      const hue = progress > 0.5 ? 150 : progress > 0.25 ? 50 : 0;
      const arcColor = `hsl(${hue}, 100%, 55%)`;
      ctx2d.beginPath();
      ctx2d.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + (1 - progress) * Math.PI * 2, false);
      ctx2d.strokeStyle = arcColor;
      ctx2d.lineWidth = 6;
      ctx2d.lineCap = 'round';
      ctx2d.stroke();

      // Countdown number
      const displaySec = Math.ceil(sec);
      const numSize = Math.min(w, h) * 0.12;
      ctx2d.save();
      ctx2d.font = `700 ${numSize}px 'Space Mono', monospace`;
      ctx2d.textAlign = 'center';
      ctx2d.textBaseline = 'middle';
      ctx2d.fillStyle = arcColor;
      // Pulse scale: bigger at each new second
      const frac = sec - Math.floor(sec); // 0→1 within each second
      const pulse = 1 + (1 - frac) * 0.15;
      ctx2d.save();
      ctx2d.translate(cx, cy);
      ctx2d.scale(pulse, pulse);
      ctx2d.fillText(displaySec, 0, 0);
      ctx2d.restore();

      // "MISEZ !" label below
      const labelSize = Math.min(w, h) * 0.035;
      ctx2d.font = `700 ${labelSize}px 'Rajdhani', sans-serif`;
      ctx2d.fillStyle = 'rgba(255,255,255,0.5)';
      ctx2d.fillText('MISEZ !', cx, cy + r + labelSize * 1.6);
      ctx2d.restore();

      // Rocket at bottom left
      ctx2d.shadowBlur = 0;
      ctx2d.font = '24px serif';
      ctx2d.fillText('🚀', 20, h - 20);

      if (remaining > 0) bettingAnimFrame = requestAnimationFrame(loop);
    }
    loop();
  }

  let animFrame = null;
  function crashedCanvas(px, py) {
    playCrashSound();
    triggerExplosion(px, py);

    function loop() {
      drawFlight(currentMult);
      if (explosionTime > 0) animFrame = requestAnimationFrame(loop);
    }
    loop();
  }

  function drawMiniChart() {
    const c = document.getElementById('mini-chart');
    if (!c) return;
    c.width = c.offsetWidth || 180;
    c.height = 60;
    const cx = c.getContext('2d');
    cx.clearRect(0, 0, c.width, c.height);
    if (chartHistory.length < 2) {
      cx.fillStyle = '#2a2a5a';
      cx.font = '10px monospace';
      cx.fillText('pas assez de données', 8, 30);
      return;
    }
    const max = Math.max(...chartHistory, 0);
    const min = Math.min(...chartHistory, 0);
    const range = max - min || 1;
    const w = c.width, h = c.height;
    const step = w / (chartHistory.length - 1);

    cx.beginPath();
    chartHistory.forEach((v, i) => {
      const x = i * step;
      const y = h - ((v - min) / range) * (h - 10) - 5;
      i === 0 ? cx.moveTo(x, y) : cx.lineTo(x, y);
    });
    // Fill
    cx.lineTo(w, h); cx.lineTo(0, h); cx.closePath();
    const grad = cx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, 'rgba(0,240,160,0.25)');
    grad.addColorStop(1, 'rgba(0,240,160,0)');
    cx.fillStyle = grad;
    cx.fill();

    cx.beginPath();
    chartHistory.forEach((v, i) => {
      const x = i * step;
      const y = h - ((v - min) / range) * (h - 10) - 5;
      i === 0 ? cx.moveTo(x, y) : cx.lineTo(x, y);
    });
    cx.strokeStyle = '#00f0a0';
    cx.lineWidth = 1.5;
    cx.stroke();
  }

    el.style.top = top + '%';
    el.textContent = '💸 ' + username + ' x' + mult.toFixed(2);
    box.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }

  // ── TABS ──
  function switchTab(tab) {
    const tabs = ['bets','leaderboard','players','stats'];
    document.querySelectorAll('.sidebar .tab-btn').forEach((b, i) => {
      b.classList.toggle('active', tabs[i] === tab);
    });
    document.querySelectorAll('.sidebar .tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'stats') updateStats();
  }

  function switchMobileTab(tab) {
    const tabs = ['bets','leaderboard','players','stats'];
    document.querySelectorAll('.mobile-tab-btn').forEach((b, i) => {
      b.classList.toggle('active', tabs[i] === tab);
    });
    document.querySelectorAll('.mobile-tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('mobile-tab-' + tab).classList.add('active');
    if (tab === 'stats') updateStats();
  }

  function renderBetItem(b) {
    const div = document.createElement('div');
    div.className = 'bet-item' + (b.cashedOut || b.cashedOut2 ? ' cashed' : '');
    const st1 = b.cashedOut ? '✅ ' + b.multiplier.toFixed(2) + 'x' : '🎯';
    const st2 = b.amount2 ? (b.cashedOut2 ? ' / ✅' + b.multiplier2.toFixed(2) + 'x' : ' / 🎯') : '';
    div.innerHTML = `
      <span class="bet-user">${b.username}</span>
      <span class="bet-amount">${b.amount}${b.amount2 ? '+'+b.amount2 : ''}$</span>
      <span class="bet-status">${st1}${st2}</span>
    `;
    return div;
  }

  function updateBetsList(bets) {
    ['tab-bets', 'mobile-tab-bets'].forEach(id => {
      const el = document.getElementById(id);
      if (!bets || !bets.length) { el.innerHTML = '<span class="empty-msg">Aucune mise</span>'; return; }
      el.innerHTML = '';
      bets.forEach(b => el.appendChild(renderBetItem(b)));
    });
  }

  function updateLeaderboard(lb) {
    ['tab-leaderboard', 'mobile-tab-leaderboard'].forEach(id => {
      const el = document.getElementById(id);
      el.innerHTML = '';
      const medals = ['🥇','🥈','🥉'];
      lb.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'lb-item';
        div.innerHTML = `
          <span class="lb-rank">${medals[i] || (i+1)}</span>
          <span class="lb-name ${p.username === username ? 'me' : ''}">${p.username}</span>
          <span class="lb-balance">${p.balance}$</span>
        `;
        el.appendChild(div);
      });
    });
  }

  function updatePlayers(players) {
    ['tab-players', 'mobile-tab-players'].forEach(id => {
      const el = document.getElementById(id);
      el.innerHTML = '';
      players.forEach(p => {
        const div = document.createElement('div');
        div.className = 'player-item';
        div.innerHTML = `<div class="player-dot"></div><span class="player-name ${p === username ? 'me' : ''}">${p === username ? '⭐ '+p : p}</span>`;
        el.appendChild(div);
      });
    });
  }

  function updateCrashHistory(history) {
    const el = document.getElementById('crash-history');
    el.innerHTML = '';
    history.forEach(val => {
      const b = document.createElement('span');
      b.className = 'crash-badge ' + (val < 2 ? 'crash-low' : val < 5 ? 'crash-mid' : 'crash-high');
      b.textContent = val.toFixed(2) + 'x';
      el.appendChild(b);
    });
  }

  // ── AUTH ──
  async function doLogin() {
    const u = document.getElementById('input-username').value.trim();
    const p = document.getElementById('input-password').value;
    if (!u || !p) return;
    const res = await fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
    const data = await res.json();
    if (data.error) { document.getElementById('auth-error').textContent = data.error; return; }
    token = data.token; username = u; balance = data.balance;
    personalHistory = data.history || [];
    bestCashout = data.bestCashout || 0;
    streak = data.streak || 0;
    enterGame();
  }

  async function doRegister() {
    const u = document.getElementById('input-username').value.trim();
    const p = document.getElementById('input-password').value;
    if (!u || !p) return;
    const res = await fetch('/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
    const data = await res.json();
    if (data.error) { document.getElementById('auth-error').textContent = data.error; return; }
    token = data.token; username = u; balance = data.balance;
    personalHistory = []; bestCashout = 0; streak = 0;
    enterGame();
  }

  // Enter on password field
  document.getElementById('input-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function enterGame() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    document.getElementById('username-display').textContent = '👤 ' + username;
    sessionStart = balance;
    socket.emit('identify', { token });
    setTimeout(() => { resizeCanvas(); resetCanvas(); }, 80);
    updateBtn();
    updateStats();
    renderPersonalHistory(personalHistory);
    startMusic();
  }

  // ── SOCKET ──
  let countdownInterval = null;

  socket.on('betting_phase', (data) => {
    gamePhase = 'betting'; hasBet = false; hasBet2 = false; currentMult = 1.0;
    document.getElementById('multiplier').textContent = '1.00x';
    document.getElementById('multiplier').style.color = 'var(--green)';
    document.getElementById('multiplier').style.textShadow = '0 0 40px var(--green-dim)';
    document.getElementById('status-text').textContent = '⏳ PHASE DE MISE';
    document.getElementById('bet-info').textContent = '';
    resetCanvas();
    updateBtn();
    // Restore inputs
    document.getElementById('bet-tabs-wrap').classList.remove('hidden');
    document.getElementById('bet-inputs-wrap1').classList.remove('hidden');
    document.getElementById('bet-inputs-wrap2').classList.remove('hidden');
    document.getElementById('auto-row-wrap').classList.remove('hidden');

    // Canvas countdown
    const dur = data.duration || 5000;
    startBettingCountdownCanvas(dur);

    // Button blink (only if player hasn't bet yet)
    document.getElementById('main-btn').classList.add('btn-blink');

    // Auto-bet
    if (autoBetEnabled && lastBetAmount > 0 && token) {
      setTimeout(() => {
        if (gamePhase === 'betting' && !hasBet) {
          socket.emit('place_bet', { token, amount: lastBetAmount, amount2: lastBetAmount2 > 0 ? lastBetAmount2 : 0 });
        }
      }, 500);
    }

    if (countdownInterval) clearInterval(countdownInterval);
    let sec = Math.ceil(dur / 1000);
    document.getElementById('countdown').textContent = '🕐 ' + sec + 's';
    countdownInterval = setInterval(() => {
      sec--;
      if (sec <= 0) { clearInterval(countdownInterval); document.getElementById('countdown').textContent = ''; }
      else document.getElementById('countdown').textContent = '🕐 ' + sec + 's';
    }, 1000);
  });

  socket.on('game_start', () => {
    gamePhase = 'flying';
    document.getElementById('status-text').textContent = '🚀 EN VOL';
    document.getElementById('countdown').textContent = '';
    if (countdownInterval) clearInterval(countdownInterval);
    if (bettingAnimFrame) { cancelAnimationFrame(bettingAnimFrame); bettingAnimFrame = null; }
    document.getElementById('main-btn').classList.remove('btn-blink');
    document.getElementById('main-btn2').classList.remove('btn-blink');
    // Collapse inputs smoothly
    document.getElementById('bet-tabs-wrap').classList.add('hidden');
    document.getElementById('bet-inputs-wrap1').classList.add('hidden');
    document.getElementById('bet-inputs-wrap2').classList.add('hidden');
    document.getElementById('auto-row-wrap').classList.add('hidden');
    startEngine(1.0);
    updateBtn();
  });

  socket.on('multiplier_update', (data) => {
    currentMult = parseFloat(data.multiplier);
    document.getElementById('multiplier').textContent = currentMult.toFixed(2) + 'x';
    drawFlight(currentMult);
    updateEngine(currentMult);

    // Live gain under buttons
    if (hasBet) {
      const total = (currentBet * currentMult).toFixed(2);
      const profit = (currentBet * currentMult - currentBet).toFixed(2);
      document.getElementById('live-gain').textContent =
        '💰 ' + total + '$ (+' + profit + '$)';
    } else {
      document.getElementById('live-gain').textContent = '';
    }
    if (hasBet2) {
      const total2 = (currentBet2 * currentMult).toFixed(2);
      const profit2 = (currentBet2 * currentMult - currentBet2).toFixed(2);
      document.getElementById('live-gain2').textContent =
        '💰 ' + total2 + '$ (+' + profit2 + '$)';
    } else {
      document.getElementById('live-gain2').textContent = '';
    }

    // Legacy bet-info (keep for mobile/sidebar)
    if (hasBet || hasBet2) {
      let parts = [];
      if (hasBet) parts.push(currentBet + '$ → ' + (currentBet * currentMult).toFixed(0) + '$');
      if (hasBet2) parts.push(currentBet2 + '$ → ' + (currentBet2 * currentMult).toFixed(0) + '$');
      document.getElementById('bet-info').textContent = parts.join('  |  ');
    }

    // Auto cashout
    if (autoEnabled) {
      const target = parseFloat(document.getElementById('auto-cashout-input').value);
      if (target && currentMult >= target) {
        if (hasBet) socket.emit('cashout', { token, which: 1 });
        if (hasBet2) socket.emit('cashout', { token, which: 2 });
      }
    }
  });

  socket.on('game_crash', (data) => {
    gamePhase = 'crashed'; stopEngine();
    document.getElementById('multiplier').textContent = '💥 ' + data.crashAt.toFixed(2) + 'x';
    document.getElementById('multiplier').style.color = 'var(--red)';
    document.getElementById('multiplier').style.textShadow = '0 0 40px var(--red-dim)';
    document.getElementById('status-text').textContent = '💥 CRASH !';
    hasBet = false; hasBet2 = false;
    document.getElementById('live-gain').textContent = '';
    document.getElementById('live-gain2').textContent = '';
    updateBtn();
    if (data.crashHistory) updateCrashHistory(data.crashHistory);
    // Trigger explosion at plane position
    const progress = Math.min(Math.log(Math.max(data.crashAt, 1)) / Math.log(14), 1);
    const { px, py } = getCurvePos(progress);
    crashedCanvas(px, py);
  });

  socket.on('crash_history', d => updateCrashHistory(d.crashHistory));
  socket.on('lost', () => showMsg('💥 PERDU !', 'var(--red)'));

  socket.on('bet_placed', (data) => {
    balance = data.balance;
    currentBet = data.amount; hasBet = true;
    if (data.amount2) { currentBet2 = data.amount2; hasBet2 = true; }
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    document.getElementById('bet-info').textContent = '🎯 ' + currentBet + (data.amount2 ? ' + ' + data.amount2 : '') + '$';
    showMsg('✅ Mise placée !', 'var(--green)');
    playBetSound();
    document.getElementById('main-btn').classList.remove('btn-blink');
    updateBtn();
  });

  socket.on('cashout_success', (data) => {
    balance = data.balance;
    if (data.which === 1) { hasBet = false; document.getElementById('live-gain').textContent = ''; }
    else { hasBet2 = false; document.getElementById('live-gain2').textContent = ''; }
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    showMsg('💸 x' + data.multiplier.toFixed(2) + ' +' + data.profit.toFixed(0) + '$', 'var(--green)');
    // Update chart
    chartHistory.push(data.profit);
    if (chartHistory.length > 30) chartHistory.shift();
    updateStats();
    updateBtn();
  });

  socket.on('cashout_event', (data) => {
    spawnCashoutNotif(data.username, data.multiplier);
  });

  socket.on('personal_stats', (data) => {
    personalHistory = data.history || [];
    bestCashout = data.bestCashout || bestCashout;
    streak = data.streak || streak;
    renderPersonalHistory(personalHistory);
    updateStats();
    updateBalance();
  });

  function updateBalance() {
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
  }

  socket.on('bet_error', d => showMsg('❌ ' + d.message, 'var(--red)'));
  socket.on('cashout_error', d => showMsg('❌ ' + d.message, 'var(--red)'));
  socket.on('bets_update', d => updateBetsList(d.activeBets));

  socket.on('lobby_update', (data) => {
    document.getElementById('connected-count').textContent = '👥 ' + data.connectedCount;
    updateLeaderboard(data.leaderboard);
    updatePlayers(data.connectedUsers);
    updateBetsList(data.activeBets);
  });

  socket.on('emoji_received', d => spawnEmojiBubble(d.username, d.emoji));

  function sendEmoji(emoji) {
    if (!token) return;
    socket.emit('send_emoji', { token, emoji });
  }
</script>
</body>
</html>
