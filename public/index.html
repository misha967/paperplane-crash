<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✈️ Paperplane Crash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* ── AUTH ── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 12px;
    }
    #auth-screen h1 { font-size: 2.5rem; margin-bottom: 10px; }
    #auth-screen input {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: #1a1a2e;
      color: #fff;
      font-size: 1rem;
      width: 280px;
    }
    #auth-screen button {
      padding: 12px 30px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      width: 280px;
    }
    #btn-login { background: #e94560; color: #fff; }
    #btn-register { background: #1a1a2e; color: #aaa; border: 1px solid #333; }
    #auth-error { color: #e94560; font-size: 0.9rem; }

    /* ── GAME SCREEN ── */
    #game-screen {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background: #0d0d1f;
      border-bottom: 1px solid #1a1a3e;
      height: 44px;
      flex-shrink: 0;
    }
    .logo { font-size: 1.1rem; font-weight: bold; }
    .top-right { display: flex; align-items: center; gap: 20px; }
    #balance { color: #00ff88; font-weight: bold; }
    #connected-count { color: #aaa; font-size: 0.85rem; }
    #username-display { color: #aaa; font-size: 0.85rem; }

    /* CRASH HISTORY BAR */
    .history-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 16px;
      background: #0a0a18;
      border-bottom: 1px solid #1a1a3e;
      height: 30px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .history-label { color: #555; font-size: 0.75rem; flex-shrink: 0; }
    .crash-badge {
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
      flex-shrink: 0;
    }
    .crash-low { background: #2a0808; color: #e94560; }
    .crash-mid { background: #0a2a0a; color: #44ff88; }
    .crash-high { background: #0a1030; color: #4499ff; }

    /* MAIN LAYOUT */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 260px;
      flex: 1;
      overflow: hidden;
    }

    /* LEFT COLUMN */
    .left-col {
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 8px;
      overflow: hidden;
    }

    /* FLIGHT BOX */
    .flight-box {
      background: #0d0d1f;
      border-radius: 12px;
      border: 1px solid #1a1a3e;
      position: relative;
      flex: 1;
      overflow: hidden;
    }
    #flight-canvas { width: 100%; height: 100%; display: block; }

    #multiplier {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3.5rem;
      font-weight: bold;
      color: #00ff88;
      text-shadow: 0 0 30px #00ff8888;
      pointer-events: none;
    }
    #status-text {
      position: absolute;
      top: 10px;
      left: 14px;
      font-size: 0.8rem;
      color: #aaa;
    }
    #countdown {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 0.9rem;
      color: #ffcc00;
      font-weight: bold;
    }
    .floating-emoji {
      position: absolute;
      font-size: 2rem;
      animation: floatUp 2s ease-out forwards;
      pointer-events: none;
      z-index: 20;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.4); }
    }

    /* BOTTOM CONTROLS */
    .bottom-controls {
      background: #0d0d1f;
      border-radius: 12px;
      border: 1px solid #1a1a3e;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .bet-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .bet-row input {
      flex: 1;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      background: #1a1a2e;
      color: #fff;
      font-size: 1rem;
    }
    .quick-bets {
      display: flex;
      gap: 5px;
    }
    .quick-btn {
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid #2a2a4a;
      background: #1a1a2e;
      color: #aaa;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .quick-btn:hover { background: #2a2a4e; color: #fff; }

    #main-btn {
      padding: 9px 22px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      min-width: 130px;
      transition: all 0.15s;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #bet-info { font-size: 0.85rem; color: #ffcc00; }
    #message { font-size: 0.85rem; }

    .emoji-row {
      display: flex;
      gap: 6px;
    }
    .emoji-btn {
      font-size: 1.3rem;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 4px 9px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .emoji-btn:hover { transform: scale(1.2); background: #2a2a4e; }

    /* RIGHT SIDEBAR */
    .sidebar {
      background: #0d0d1f;
      border-left: 1px solid #1a1a3e;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid #1a1a3e;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 4px;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.75rem;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab-btn.active { color: #fff; border-bottom-color: #e94560; }
    .tab-content {
      display: none;
      flex-direction: column;
      overflow-y: auto;
      flex: 1;
      padding: 8px;
      gap: 4px;
    }
    .tab-content.active { display: flex; }

    /* Bet items */
    .bet-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      border-radius: 8px;
      background: #1a1a2e;
      font-size: 0.82rem;
      gap: 4px;
    }
    .bet-item.cashed { background: #0a2a15; }
    .bet-item.lost { background: #2a0a0a; }
    .bet-user { font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80px; }
    .bet-amount { color: #ffcc00; flex-shrink: 0; }
    .bet-status { flex-shrink: 0; font-size: 0.8rem; }

    /* Leaderboard */
    .lb-item {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 8px;
      background: #1a1a2e;
      font-size: 0.82rem;
      gap: 6px;
    }
    .lb-rank { width: 22px; text-align: center; font-weight: bold; color: #555; font-size: 0.8rem; }
    .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-name.me { color: #00ff88; }
    .lb-balance { color: #00ff88; font-weight: bold; flex-shrink: 0; }

    /* Players */
    .player-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 8px;
      background: #1a1a2e;
      font-size: 0.82rem;
    }
    .player-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; flex-shrink: 0; }
    .player-name { flex: 1; }
    .player-name.me { color: #00ff88; font-weight: bold; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }
  </style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="auth-screen">
  <h1>✈️ Paperplane Crash</h1>
  <input type="text" id="input-username" placeholder="Pseudo" />
  <input type="password" id="input-password" placeholder="Mot de passe" />
  <button id="btn-login" onclick="doLogin()">🔑 Connexion</button>
  <button id="btn-register" onclick="doRegister()">📝 Créer un compte</button>
  <span id="auth-error"></span>
</div>

<!-- ── GAME ── -->
<div id="game-screen">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">✈️ Paperplane Crash</div>
    <div class="top-right">
      <span id="connected-count">👥 0 joueur</span>
      <span id="balance">💰 1000 $</span>
      <span id="username-display"></span>
    </div>
  </div>

  <!-- HISTORY BAR -->
  <div class="history-bar">
    <span class="history-label">Crashs :</span>
    <div id="crash-history" style="display:flex; gap:6px; overflow:hidden;"></div>
  </div>

  <!-- MAIN -->
  <div class="main-layout">

    <!-- LEFT -->
    <div class="left-col">

      <!-- FLIGHT -->
      <div class="flight-box">
        <canvas id="flight-canvas"></canvas>
        <div id="status-text">⏳ Phase de mise</div>
        <div id="countdown"></div>
        <div id="multiplier">1.00x</div>
      </div>

      <!-- CONTROLS -->
      <div class="bottom-controls">
        <div class="bet-row">
          <input type="number" id="bet-input" placeholder="Mise..." min="1" />
          <div class="quick-bets">
            <button class="quick-btn" onclick="setQuick(10)">10</button>
            <button class="quick-btn" onclick="setQuick(50)">50</button>
            <button class="quick-btn" onclick="setQuick(100)">100</button>
            <button class="quick-btn" onclick="setQuick(500)">500</button>
          </div>
          <button id="main-btn" onclick="mainAction()">✅ Miser</button>
        </div>
        <div class="info-row">
          <div class="emoji-row">
            <button class="emoji-btn" onclick="sendEmoji('💩')">💩</button>
            <button class="emoji-btn" onclick="sendEmoji('🖕')">🖕</button>
            <button class="emoji-btn" onclick="sendEmoji('🍆')">🍆</button>
            <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
            <button class="emoji-btn" onclick="sendEmoji('🔥')">🔥</button>
            <button class="emoji-btn" onclick="sendEmoji('💸')">💸</button>
            <button class="emoji-btn" onclick="sendEmoji('😱')">😱</button>
          </div>
          <div style="display:flex; flex-direction:column; align-items:flex-end; gap:2px;">
            <div id="bet-info"></div>
            <div id="message"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-tabs">
        <button class="tab-btn active" onclick="switchTab('bets')">🎯 Mises</button>
        <button class="tab-btn" onclick="switchTab('leaderboard')">🏆 Top</button>
        <button class="tab-btn" onclick="switchTab('players')">👥 Joueurs</button>
      </div>
      <div class="tab-content active" id="tab-bets">
        <span style="color:#444; font-size:0.8rem; padding:4px;">Aucune mise</span>
      </div>
      <div class="tab-content" id="tab-leaderboard"></div>
      <div class="tab-content" id="tab-players"></div>
    </div>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  let token = null, username = null, balance = 0;
  let gamePhase = 'waiting', hasBet = false, currentBet = 0;
  let currentMult = 1.0;
  const socket = io();

  // ── CANVAS ──
  const canvas = document.getElementById('flight-canvas');
  const ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function drawGrid() {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = '#12122a';
    ctx.lineWidth = 1;
    for (let x = 0; x < w; x += 50) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let y = 0; y < h; y += 40) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
  }

  function drawFlight(mult) {
    const w = canvas.width, h = canvas.height;
    drawGrid();
    const progress = Math.min(Math.log(mult) / Math.log(12), 1);
    const px = progress * (w - 60) + 20;
    const py = h - (progress * (h - 60)) - 20;

    // Gradient line
    const grad = ctx.createLinearGradient(20, h - 20, px, py);
    grad.addColorStop(0, '#00ff8822');
    grad.addColorStop(1, '#00ff88');
    ctx.beginPath();
    ctx.strokeStyle = grad;
    ctx.lineWidth = 3;
    ctx.moveTo(20, h - 20);
    ctx.lineTo(px, py);
    ctx.stroke();

    // Glow
    ctx.beginPath();
    ctx.strokeStyle = '#00ff8833';
    ctx.lineWidth = 8;
    ctx.moveTo(20, h - 20);
    ctx.lineTo(px, py);
    ctx.stroke();

    // Plane
    ctx.save();
    ctx.translate(px, py);
    const angle = -Math.atan2(progress * (h - 60), progress * (w - 60));
    ctx.rotate(angle);
    ctx.font = '24px serif';
    ctx.fillText('✈️', -12, 8);
    ctx.restore();
  }

  function resetCanvas() {
    const w = canvas.width, h = canvas.height;
    drawGrid();
    ctx.font = '24px serif';
    ctx.fillText('✈️', 15, h - 15);
  }

  // ── UI HELPERS ──
  function showMsg(msg, color) {
    const el = document.getElementById('message');
    el.textContent = msg;
    el.style.color = color;
  }

  function setQuick(val) {
    document.getElementById('bet-input').value = val;
  }

  function updateBtn() {
    const btn = document.getElementById('main-btn');
    const states = {
      betting_free:   { text: '✅ Miser',       bg: '#00aa55', color: '#fff',  disabled: false },
      betting_done:   { text: '⏳ Misé...',      bg: '#1a3a2a', color: '#00ff88', disabled: true },
      flying_bet:     { text: '💸 CASHOUT',      bg: '#e94560', color: '#fff',  disabled: false },
      flying_nobet:   { text: '🚀 En vol',        bg: '#1a1a2e', color: '#555',  disabled: true },
      crashed:        { text: '⏳ Prochain...',   bg: '#1a1a2e', color: '#555',  disabled: true },
    };
    let key = 'crashed';
    if (gamePhase === 'betting') key = hasBet ? 'betting_done' : 'betting_free';
    else if (gamePhase === 'flying') key = hasBet ? 'flying_bet' : 'flying_nobet';
    const s = states[key];
    btn.textContent = s.text;
    btn.style.background = s.bg;
    btn.style.color = s.color;
    btn.disabled = s.disabled;
  }

  function mainAction() {
    if (gamePhase === 'betting' && !hasBet) {
      const amount = parseFloat(document.getElementById('bet-input').value);
      if (!amount || amount <= 0) return showMsg('❌ Mise invalide', '#e94560');
      socket.emit('place_bet', { token, amount });
    } else if (gamePhase === 'flying' && hasBet) {
      socket.emit('cashout', { token });
    }
  }

  function sendEmoji(emoji) {
    if (!token) return;
    socket.emit('send_emoji', { token, emoji });
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', ['bets','leaderboard','players'][i] === tab);
    });
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
  }

  function updateCrashHistory(history) {
    const el = document.getElementById('crash-history');
    el.innerHTML = '';
    history.forEach(val => {
      const b = document.createElement('span');
      b.className = 'crash-badge ' + (val < 2 ? 'crash-low' : val < 5 ? 'crash-mid' : 'crash-high');
      b.textContent = val.toFixed(2) + 'x';
      el.appendChild(b);
    });
  }

  function updateBetsList(bets) {
    const el = document.getElementById('tab-bets');
    if (!bets || !bets.length) {
      el.innerHTML = '<span style="color:#444; font-size:0.8rem; padding:4px;">Aucune mise</span>';
      return;
    }
    el.innerHTML = '';
    bets.forEach(b => {
      const div = document.createElement('div');
      div.className = 'bet-item' + (b.cashedOut ? ' cashed' : '');
      div.innerHTML = `
        <span class="bet-user">${b.username}</span>
        <span class="bet-amount">${b.amount}$</span>
        <span class="bet-status">${b.cashedOut ? '✅ ' + b.multiplier + 'x' : '🎯'}</span>
      `;
      el.appendChild(div);
    });
  }

  function updateLeaderboard(lb) {
    const el = document.getElementById('tab-leaderboard');
    el.innerHTML = '';
    const medals = ['🥇','🥈','🥉'];
    lb.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'lb-item';
      div.innerHTML = `
        <span class="lb-rank">${medals[i] || (i+1)}</span>
        <span class="lb-name ${p.username === username ? 'me' : ''}">${p.username}</span>
        <span class="lb-balance">${p.balance}$</span>
      `;
      el.appendChild(div);
    });
  }

  function updatePlayers(players) {
    const el = document.getElementById('tab-players');
    el.innerHTML = '';
    players.forEach(p => {
      const div = document.createElement('div');
      div.className = 'player-item';
      div.innerHTML = `
        <div class="player-dot"></div>
        <span class="player-name ${p === username ? 'me' : ''}">${p === username ? '⭐ ' + p : p}</span>
      `;
      el.appendChild(div);
    });
  }

  function spawnEmoji(emoji) {
    const box = document.querySelector('.flight-box');
    const el = document.createElement('div');
    el.className = 'floating-emoji';
    el.textContent = emoji;
    el.style.left = (10 + Math.random() * 80) + '%';
    el.style.bottom = '30px';
    box.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }

  // ── AUTH ──
  async function doLogin() {
    const u = document.getElementById('input-username').value.trim();
    const p = document.getElementById('input-password').value.trim();
    if (!u || !p) return;
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (data.error) { document.getElementById('auth-error').textContent = data.error; return; }
    token = data.token; username = u; balance = data.balance;
    enterGame();
  }

  async function doRegister() {
    const u = document.getElementById('input-username').value.trim();
    const p = document.getElementById('input-password').value.trim();
    if (!u || !p) return;
    const res = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (data.error) { document.getElementById('auth-error').textContent = data.error; return; }
    token = data.token; username = u; balance = data.balance;
    enterGame();
  }

  function enterGame() {
    document.getElementById('auth-screen').style.display = 'none';
    const gs = document.getElementById('game-screen');
    gs.style.display = 'flex';
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    document.getElementById('username-display').textContent = '👤 ' + username;
    socket.emit('identify', { token });
    setTimeout(() => { resizeCanvas(); resetCanvas(); }, 50);
    updateBtn();
  }

  // ── SOCKET ──
  let countdownInterval = null;

  socket.on('betting_phase', (data) => {
    gamePhase = 'betting';
    hasBet = false;
    currentMult = 1.0;
    document.getElementById('multiplier').textContent = '1.00x';
    document.getElementById('multiplier').style.color = '#00ff88';
    document.getElementById('multiplier').style.textShadow = '0 0 30px #00ff8888';
    document.getElementById('bet-info').textContent = '';
    document.getElementById('message').textContent = '';
    document.getElementById('status-text').textContent = '⏳ Phase de mise';
    resetCanvas();
    updateBtn();

    if (countdownInterval) clearInterval(countdownInterval);
    let sec = data.duration ? Math.ceil(data.duration / 1000) : 5;
    document.getElementById('countdown').textContent = '🕐 ' + sec + 's';
    countdownInterval = setInterval(() => {
      sec--;
      if (sec <= 0) { clearInterval(countdownInterval); document.getElementById('countdown').textContent = ''; }
      else document.getElementById('countdown').textContent = '🕐 ' + sec + 's';
    }, 1000);
  });

  socket.on('game_start', () => {
    gamePhase = 'flying';
    document.getElementById('status-text').textContent = '🚀 En vol !';
    document.getElementById('countdown').textContent = '';
    document.getElementById('message').textContent = '';
    if (countdownInterval) clearInterval(countdownInterval);
    updateBtn();
  });

  socket.on('multiplier_update', (data) => {
    currentMult = parseFloat(data.multiplier);
    document.getElementById('multiplier').textContent = currentMult.toFixed(2) + 'x';
    drawFlight(currentMult);
    if (hasBet) {
      const pot = (currentBet * currentMult).toFixed(2);
      document.getElementById('bet-info').textContent = currentBet + '$ → ' + pot + '$';
    }
  });

  socket.on('game_crash', (data) => {
    gamePhase = 'crashed';
    document.getElementById('multiplier').textContent = '💥 ' + data.crashAt + 'x';
    document.getElementById('multiplier').style.color = '#e94560';
    document.getElementById('multiplier').style.textShadow = '0 0 30px #e9456088';
    document.getElementById('status-text').textContent = '💥 Crash !';
    hasBet = false;
    updateBtn();
    if (data.crashHistory) updateCrashHistory(data.crashHistory);
  });

  socket.on('crash_history', (data) => updateCrashHistory(data.crashHistory));

  socket.on('lost', () => showMsg('💥 Perdu !', '#e94560'));

  socket.on('bet_placed', (data) => {
    balance = data.balance;
    currentBet = data.amount;
    hasBet = true;
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    document.getElementById('bet-info').textContent = '🎯 Mise : ' + currentBet + '$';
    showMsg('✅ Mise placée !', '#00ff88');
    updateBtn();
  });

  socket.on('cashout_success', (data) => {
    balance = data.balance;
    hasBet = false;
    document.getElementById('balance').textContent = '💰 ' + balance + ' $';
    document.getElementById('bet-info').textContent = '';
    showMsg('✅ x' + data.multiplier + ' +' + data.profit + '$', '#00ff88');
    updateBtn();
  });

  socket.on('bet_error', (d) => showMsg('❌ ' + d.message, '#e94560'));
  socket.on('cashout_error', (d) => showMsg('❌ ' + d.message, '#e94560'));

  socket.on('bets_update', (data) => updateBetsList(data.activeBets));

  socket.on('lobby_update', (data) => {
    const n = data.connectedCount;
    document.getElementById('connected-count').textContent = '👥 ' + n + ' joueur' + (n > 1 ? 's' : '');
    updateLeaderboard(data.leaderboard);
    updatePlayers(data.connectedUsers);
    updateBetsList(data.activeBets);
  });

  socket.on('emoji_received', (data) => spawnEmoji(data.emoji));
</script>
</body>
</html>
